<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard — FarmAd</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Reset & Variables ─────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --earth:      #1c2e0e;
  --earth-mid:  #2d4a17;
  --leaf:       #3a7d2c;
  --harvest:    #e8a020;
  --harvest-lt: #f5c05a;
  --cream:      #f2ede4;
  --cream-dk:   #e8e0d0;
  --mist:       #f0ece3;
  --subtext:    #7a6a58;
  --border:     rgba(92,51,23,0.10);
  --border-lt:  rgba(92,51,23,0.06);
  --shadow-sm:  0 1px 4px rgba(28,46,14,0.06);
  --shadow-md:  0 4px 20px rgba(28,46,14,0.10);
  --radius:     14px;
  --radius-lg:  20px;
  --sidebar-w:  240px;
  --topbar-h:   60px;
}
html { scroll-behavior:smooth; }
body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--earth); min-height:100vh; display:flex; }

/* ── Sidebar ───────────────────────────────────────────────────────────────── */
.sidebar {
  width:var(--sidebar-w); min-height:100vh; background:var(--earth);
  position:fixed; top:0; left:0;
  display:flex; flex-direction:column; z-index:100; overflow:hidden;
}
.sidebar::before {
  content:''; position:absolute; top:-80px; right:-80px;
  width:260px; height:260px; border-radius:50%;
  background:radial-gradient(circle,rgba(232,160,32,0.08) 0%,transparent 70%);
  pointer-events:none;
}
.sidebar-logo {
  padding:1.5rem 1.5rem 1.25rem;
  font-family:'Playfair Display',serif; font-size:1.55rem; font-weight:900;
  color:white; letter-spacing:-0.5px; text-decoration:none; display:block; flex-shrink:0;
}
.sidebar-logo span { color:var(--harvest); }
.sidebar-nav { flex:1; overflow-y:auto; padding:0 0.75rem 1rem; }
.sidebar-nav::-webkit-scrollbar { width:3px; }
.sidebar-nav::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:100px; }
.nav-section-label {
  font-size:0.6rem; font-weight:700; letter-spacing:2px; text-transform:uppercase;
  color:rgba(255,255,255,0.25); padding:1.1rem 0.85rem 0.4rem;
}
.nav-item {
  display:flex; align-items:center; gap:0.7rem;
  padding:0.62rem 0.85rem; border-radius:10px;
  text-decoration:none; color:rgba(255,255,255,0.55);
  font-size:0.86rem; font-weight:500; transition:all 0.18s; position:relative; margin-bottom:2px;
}
.nav-item:hover { background:rgba(255,255,255,0.07); color:rgba(255,255,255,0.85); }
.nav-item.active { background:rgba(255,255,255,0.10); color:white; font-weight:600; }
.nav-item.active::before {
  content:''; position:absolute; left:0; top:20%; bottom:20%;
  width:3px; background:var(--harvest); border-radius:0 3px 3px 0;
}
.nav-icon  { font-size:1rem; width:18px; text-align:center; flex-shrink:0; }
.nav-badge { margin-left:auto; font-size:0.65rem; font-weight:700; padding:0.15rem 0.5rem; border-radius:100px; flex-shrink:0; }
.badge-green { background:rgba(58,125,44,0.35); color:#6ee35a; }
.badge-gold  { background:rgba(232,160,32,0.30); color:var(--harvest-lt); }
.badge-red   { background:rgba(239,68,68,0.30);  color:#f87171; }
.sidebar-footer {
  border-top:1px solid rgba(255,255,255,0.07);
  padding:1rem 1.25rem; display:flex; align-items:center; gap:0.75rem; flex-shrink:0;
}
.sf-avatar {
  width:38px; height:38px; border-radius:50%;
  background:linear-gradient(135deg,var(--harvest),#c47a10);
  color:var(--earth); font-family:'Playfair Display',serif; font-size:1rem; font-weight:900;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.sf-name  { font-size:0.82rem; font-weight:600; color:white; line-height:1.2; }
.sf-role  { font-size:0.68rem; color:rgba(255,255,255,0.4); display:flex; align-items:center; gap:0.3rem; }
.sf-stars { color:var(--harvest); font-size:0.65rem; letter-spacing:0.5px; }

/* ── Top Bar ───────────────────────────────────────────────────────────────── */
.topbar {
  position:fixed; top:0; left:var(--sidebar-w); right:0; height:var(--topbar-h);
  background:rgba(255,255,255,0.92); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between; padding:0 2.5rem; z-index:90; gap:1rem;
}
.topbar-left { display:flex; align-items:center; gap:1rem; }
.hamburger {
  width:36px; height:36px; border-radius:10px; border:none; background:var(--mist);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:1rem; color:var(--earth); transition:background 0.15s;
}
.hamburger:hover { background:var(--cream-dk); }
.wallet-pill {
  display:inline-flex; align-items:center; gap:0.5rem;
  background:var(--earth); color:white; padding:0.38rem 1rem; border-radius:100px;
  font-size:0.82rem; font-weight:700;
}
.wp-icon  { font-size:0.9rem; }
.wp-label { color:rgba(255,255,255,0.5); font-weight:400; font-size:0.72rem; margin-right:-0.2rem; }
.topbar-right { display:flex; align-items:center; gap:0.6rem; }
.icon-btn {
  width:38px; height:38px; border-radius:10px; border:none; background:var(--mist);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:1.05rem; position:relative; transition:background 0.15s;
}
.icon-btn:hover { background:var(--cream-dk); }
.dot-badge {
  position:absolute; top:6px; right:6px;
  width:8px; height:8px; background:#ef4444; border:1.5px solid white; border-radius:50%;
}
.profile-chip {
  display:flex; align-items:center; gap:0.6rem;
  padding:0.35rem 0.9rem 0.35rem 0.45rem;
  background:var(--mist); border-radius:100px; cursor:pointer; transition:background 0.15s;
}
.profile-chip:hover { background:var(--cream-dk); }
.pc-avatar {
  width:28px; height:28px; border-radius:50%;
  background:linear-gradient(135deg,var(--leaf),var(--earth-mid));
  color:white; font-family:'Playfair Display',serif; font-size:0.8rem; font-weight:900;
  display:flex; align-items:center; justify-content:center;
}
.pc-name   { font-size:0.82rem; font-weight:600; color:var(--earth); }
.pc-status { font-size:0.62rem; font-weight:700; padding:0.1rem 0.45rem; border-radius:100px; background:rgba(58,125,44,0.12); color:var(--leaf); }

/* ── Page shell ────────────────────────────────────────────────────────────── */
.page { margin-left:var(--sidebar-w); min-height:100vh; flex:1; display:flex; flex-direction:column; }

/* ── Hero ──────────────────────────────────────────────────────────────────── */
.dash-hero {
  background:linear-gradient(140deg,#1c2e0e 0%,#1c400f 55%,#234f10 100%);
  padding:calc(var(--topbar-h) + 2.5rem) 2.5rem 0;
  position:relative; overflow:hidden;
}
.dash-hero::before {
  content:''; position:absolute; top:-80px; right:-80px;
  width:380px; height:380px; border-radius:50%;
  background:radial-gradient(circle,rgba(232,160,32,0.10) 0%,transparent 68%); pointer-events:none;
}
.dash-hero::after {
  content:''; position:absolute; bottom:-60px; left:28%;
  width:260px; height:260px; border-radius:50%;
  background:radial-gradient(circle,rgba(58,125,44,0.18) 0%,transparent 70%); pointer-events:none;
}
.hero-inner {
  position:relative; z-index:1;
  display:flex; align-items:flex-end; justify-content:space-between; gap:2rem; flex-wrap:wrap;
}
.hero-left      { padding-bottom:2.5rem; }
.hero-greeting  { font-size:0.7rem; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; color:var(--harvest); margin-bottom:0.55rem; }
.hero-name      { font-family:'Playfair Display',serif; font-size:clamp(1.9rem,3.2vw,2.6rem); font-weight:900; color:white; line-height:1.08; }
.hero-sub       { font-size:0.86rem; color:rgba(255,255,255,0.42); margin-top:0.45rem; font-weight:300; }
.hero-avatar-wrap { display:flex; align-items:center; gap:0.75rem; margin-top:1.25rem; flex-wrap:wrap; }
.hero-avatar {
  width:50px; height:50px; border-radius:50%;
  background:var(--harvest); color:var(--earth);
  font-family:'Playfair Display',serif; font-size:1.3rem; font-weight:900;
  display:flex; align-items:center; justify-content:center;
  border:2px solid rgba(255,255,255,0.12); flex-shrink:0;
}
.hero-badge {
  display:inline-flex; align-items:center; gap:0.3rem;
  background:rgba(255,255,255,0.09); border:1px solid rgba(255,255,255,0.16); border-radius:100px;
  padding:0.28rem 0.8rem; font-size:0.73rem; font-weight:600; color:rgba(255,255,255,0.78);
}
.hero-badge.gold-badge { background:rgba(232,160,32,0.18); border-color:rgba(232,160,32,0.32); color:var(--harvest-lt); }
.hero-edit-link {
  font-size:0.76rem; color:rgba(255,255,255,0.35); text-decoration:none;
  padding-bottom:2.5rem; align-self:flex-end; transition:color 0.2s; white-space:nowrap;
}
.hero-edit-link:hover { color:var(--harvest); }

/* Stats strip */
.stats-strip {
  display:grid; grid-template-columns:repeat(4,1fr);
  background:rgba(0,0,0,0.22); border-top:1px solid rgba(255,255,255,0.06); position:relative; z-index:1;
}
.stat-cell { padding:1.3rem 1.5rem; border-right:1px solid rgba(255,255,255,0.06); position:relative; }
.stat-cell:last-child { border-right:none; }
.stat-cell-icon { position:absolute; top:1rem; right:1.25rem; font-size:1rem; opacity:0.25; }
.stat-num       { font-family:'Playfair Display',serif; font-size:1.85rem; font-weight:900; color:white; line-height:1; }
.stat-num.gold  { color:var(--harvest); }
.stat-label     { font-size:0.68rem; color:rgba(255,255,255,0.38); margin-top:0.3rem; font-weight:500; letter-spacing:0.3px; }

/* ── Skeletons ─────────────────────────────────────────────────────────────── */
@keyframes shimmer {
  0%   { background-position:-600px 0; }
  100% { background-position: 600px 0; }
}
.skeleton {
  background:linear-gradient(90deg,rgba(255,255,255,0.05) 25%,rgba(255,255,255,0.1) 50%,rgba(255,255,255,0.05) 75%);
  background-size:600px 100%; animation:shimmer 1.4s infinite linear; border-radius:12px;
}
.skeleton-light {
  background:linear-gradient(90deg,#ede8e0 25%,#e3ddd3 50%,#ede8e0 75%);
  background-size:600px 100%; animation:shimmer 1.4s infinite linear; border-radius:12px;
}

/* ── Content grid ──────────────────────────────────────────────────────────── */
.content-wrap { display:grid; grid-template-columns:1fr 320px; gap:2rem; padding:2.5rem; align-items:start; }

/* ── Alert banner ──────────────────────────────────────────────────────────── */
.alert-banner {
  display:flex; align-items:center; gap:1rem;
  background:#fffbec; border:1px solid rgba(232,160,32,0.3); border-radius:var(--radius);
  padding:0.85rem 1.1rem; margin-bottom:1.75rem; font-size:0.84rem; color:#7a5a10;
}
.alert-banner strong { font-weight:700; }
.alert-close {
  margin-left:auto; width:24px; height:24px; border-radius:6px; border:none;
  background:rgba(232,160,32,0.12); cursor:pointer; font-size:0.75rem; color:#a07830;
  display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background 0.15s;
}
.alert-close:hover { background:rgba(232,160,32,0.22); }

/* ── Quick actions ─────────────────────────────────────────────────────────── */
.quick-row { display:flex; gap:0.65rem; flex-wrap:wrap; margin-bottom:2rem; }
.qbtn {
  display:inline-flex; align-items:center; gap:0.45rem;
  padding:0.62rem 1.2rem; border-radius:100px;
  font-family:'DM Sans',sans-serif; font-weight:700; font-size:0.83rem;
  cursor:pointer; text-decoration:none; transition:all 0.2s; border:none; white-space:nowrap;
}
.qbtn-primary { background:var(--leaf); color:white; box-shadow:0 4px 14px rgba(58,125,44,0.28); }
.qbtn-primary:hover { background:var(--earth-mid); transform:translateY(-1px); }
.qbtn-soft { background:white; color:var(--earth); border:1.5px solid var(--border); }
.qbtn-soft:hover { border-color:var(--leaf); color:var(--leaf); }

/* ── Section header ────────────────────────────────────────────────────────── */
.sec-head  { display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; }
.sec-title { font-family:'Playfair Display',serif; font-size:1.18rem; font-weight:900; color:var(--earth); }
.sec-link  { font-size:0.78rem; color:var(--leaf); font-weight:600; text-decoration:none; }
.sec-link:hover { text-decoration:underline; }

/* ── Review cards ──────────────────────────────────────────────────────────── */
.review-section { margin-bottom:2rem; }
.review-card {
  background:linear-gradient(135deg,#fffbf0,#fff8e6);
  border:1px solid rgba(232,160,32,0.2); border-radius:var(--radius);
  padding:1rem 1.2rem; margin-bottom:0.65rem;
  display:flex; align-items:center; justify-content:space-between; gap:1rem;
  transition:box-shadow 0.2s, transform 0.2s;
}
.review-card:hover { box-shadow:0 4px 18px rgba(232,160,32,0.12); transform:translateY(-1px); }
.rc-icon { font-size:1.35rem; flex-shrink:0; }
.rc-name { font-weight:700; color:var(--earth); font-size:0.87rem; }
.rc-sub  { font-size:0.72rem; color:var(--subtext); margin-top:0.1rem; }

/* ── Order cards ───────────────────────────────────────────────────────────── */
.orders-section { margin-bottom:2rem; }
.order-card {
  background:white; border-radius:var(--radius); border:1px solid var(--border);
  padding:1rem 1.2rem; margin-bottom:0.65rem;
  display:grid; grid-template-columns:1fr auto; gap:0.75rem; align-items:center;
  transition:box-shadow 0.2s, transform 0.2s;
}
.order-card:hover { box-shadow:var(--shadow-md); transform:translateY(-1px); }
.oc-top  { display:flex; align-items:center; gap:0.55rem; flex-wrap:wrap; margin-bottom:0.28rem; }
.oc-id   { font-size:0.67rem; font-family:monospace; color:rgba(107,82,64,0.48); background:var(--mist); padding:0.13rem 0.45rem; border-radius:5px; }
.oc-amount { font-weight:700; color:var(--earth); font-size:0.93rem; }
.oc-meta   { font-size:0.74rem; color:var(--subtext); display:flex; align-items:center; gap:0.45rem; flex-wrap:wrap; }
.oc-dot    { opacity:0.28; }
.oc-actions { display:flex; gap:0.38rem; flex-wrap:wrap; margin-top:0.55rem; }
.oa-btn { padding:0.3rem 0.75rem; border-radius:7px; border:none; font-family:'DM Sans',sans-serif; font-size:0.71rem; font-weight:700; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
.oa-confirm { background:var(--leaf); color:white; }
.oa-confirm:hover { background:var(--earth-mid); }
.oa-ready   { background:#dbeafe; color:#1e40af; }
.oa-ready:hover   { background:#bfdbfe; }
.oa-transit { background:#e0e7ff; color:#3730a3; }
.oa-transit:hover { background:#c7d2fe; }
.oa-deliver { background:#dcfce7; color:#166534; }
.oa-deliver:hover { background:#bbf7d0; }
.oa-cancel  { background:#fee2e2; color:#991b1b; }
.oa-cancel:hover  { background:#fecaca; }
.oc-right { display:flex; flex-direction:column; align-items:flex-end; gap:0.4rem; }
.oc-details-link { font-size:0.74rem; color:var(--leaf); font-weight:600; text-decoration:none; white-space:nowrap; }
.oc-details-link:hover { text-decoration:underline; }

/* Status badges */
.status-badge { display:inline-flex; align-items:center; gap:0.28rem; font-size:0.68rem; font-weight:700; padding:0.2rem 0.6rem; border-radius:100px; }
.status-pending    { background:#fef3c7; color:#92400e; }
.status-confirmed  { background:#dbeafe; color:#1e40af; }
.status-ready      { background:#e0e7ff; color:#3730a3; }
.status-in-transit,.status-in_transit { background:#ede9fe; color:#4c1d95; }
.status-delivered  { background:#dcfce7; color:#14532d; }
.status-cancelled  { background:#fee2e2; color:#991b1b; }

/* Empty state */
.empty-state { text-align:center; padding:3rem 1rem; color:var(--subtext); }
.empty-state .icon { font-size:2.5rem; margin-bottom:0.75rem; }
.empty-state h3 { font-family:'Playfair Display',serif; font-size:1.1rem; font-weight:900; color:var(--earth); margin-bottom:0.4rem; }
.empty-state p  { font-size:0.85rem; }
.btn-primary {
  display:inline-flex; align-items:center; padding:0.62rem 1.2rem; border-radius:100px;
  background:var(--leaf); color:white; font-family:'DM Sans',sans-serif; font-weight:700; font-size:0.83rem;
  text-decoration:none; transition:background 0.2s; border:none; cursor:pointer;
}
.btn-primary:hover { background:var(--earth-mid); }

/* ── Sidebar cards ─────────────────────────────────────────────────────────── */
.sidebar-card { background:white; border-radius:var(--radius-lg); border:1px solid var(--border-lt); padding:1.5rem; margin-bottom:1.1rem; box-shadow:var(--shadow-sm); }
.sc-label { font-size:0.67rem; font-weight:700; letter-spacing:1.8px; text-transform:uppercase; color:var(--subtext); margin-bottom:1.1rem; }
/* profile */
.farm-profile { text-align:center; }
.fp-avatar {
  width:68px; height:68px; border-radius:50%;
  background:linear-gradient(135deg,var(--leaf),var(--earth));
  color:white; font-family:'Playfair Display',serif; font-size:1.7rem; font-weight:900;
  display:flex; align-items:center; justify-content:center; margin:0 auto 0.7rem;
  box-shadow:0 4px 14px rgba(28,46,14,0.2);
}
.fp-name  { font-family:'Playfair Display',serif; font-size:1.05rem; font-weight:900; color:var(--earth); }
.fp-role  { font-size:0.74rem; color:var(--subtext); margin-top:0.18rem; }
.fp-rating { display:flex; align-items:center; justify-content:center; gap:0.4rem; margin:0.65rem 0 0; font-size:0.8rem; color:var(--subtext); }
.fp-stars  { color:var(--harvest); font-size:0.9rem; letter-spacing:1px; }
.fp-stats  { display:grid; grid-template-columns:1fr 1fr; gap:0.65rem; margin:1.1rem 0 1rem; }
.fp-stat   { background:var(--mist); border-radius:12px; padding:0.75rem 0.5rem; text-align:center; }
.fp-stat-num   { font-family:'Playfair Display',serif; font-size:1.3rem; font-weight:900; color:var(--earth); }
.fp-stat-label { font-size:0.63rem; color:var(--subtext); margin-top:0.12rem; }
.fp-edit-btn {
  display:block; width:100%; padding:0.62rem;
  background:var(--mist); border:none; border-radius:12px;
  font-family:'DM Sans',sans-serif; font-weight:600; font-size:0.81rem;
  color:var(--earth); cursor:pointer; text-decoration:none; text-align:center; transition:background 0.2s;
}
.fp-edit-btn:hover { background:var(--cream-dk); }
/* quick links */
.sidebar-links { display:flex; flex-direction:column; gap:0.25rem; }
.sidebar-link {
  display:flex; align-items:center; gap:0.7rem;
  padding:0.6rem 0.8rem; border-radius:10px;
  text-decoration:none; color:var(--subtext); font-size:0.84rem; font-weight:500; transition:all 0.15s;
}
.sidebar-link:hover { background:var(--mist); color:var(--earth); }
.sl-icon { width:30px; height:30px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:0.95rem; flex-shrink:0; }
/* breakdown */
.breakdown-row { margin-bottom:0.7rem; }
.br-head  { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.28rem; }
.br-label { display:flex; align-items:center; gap:0.45rem; font-size:0.77rem; color:var(--subtext); }
.br-count { font-size:0.74rem; font-weight:600; color:var(--earth); }
.br-track { background:var(--mist); border-radius:100px; height:5px; overflow:hidden; }
.br-fill  { height:100%; border-radius:100px; transition:width 0.7s cubic-bezier(0.4,0,0.2,1); width:0%; }
.br-fill.pending   { background:#f59e0b; }
.br-fill.confirmed { background:#3b82f6; }
.br-fill.delivered { background:#22c55e; }
.br-fill.cancelled { background:#ef4444; }
/* activity-dot alias (used by buildStatusBar) */
.activity-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; display:inline-block; }
.dot-pending   { background:#f59e0b; }
.dot-confirmed { background:#3b82f6; }
.dot-delivered { background:#22c55e; }
.dot-cancelled { background:#ef4444; }

/* ── Review Modal ──────────────────────────────────────────────────────────── */
.modal-overlay {
  position:fixed; inset:0; background:rgba(28,46,14,0.45);
  backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
  display:none; align-items:center; justify-content:center; z-index:500; padding:1.5rem;
}
.modal-overlay.open { display:flex; }
.modal {
  background:white; border-radius:var(--radius-lg); padding:2rem;
  width:100%; max-width:440px; position:relative;
  box-shadow:0 20px 60px rgba(28,46,14,0.25); animation:fadeUp 0.25s ease;
}
.modal-close {
  position:absolute; top:1rem; right:1rem; width:28px; height:28px; border-radius:8px;
  border:none; background:var(--mist); cursor:pointer; font-size:0.8rem; color:var(--subtext); transition:background 0.15s;
}

<!-- ── Shared utilities: apiFetch, requireAuth, getUser, toast, fmtPrice, fmtDate ── -->
<script src="/shared.js"></script>
<script>
/* Override nav — dashboard uses its own sidebar, not the shared nav bar */
updateNav = function() { /* no-op */ };

/* ── Auth guard ── */
const user = requireAuth();
if (!user) throw new Error('redirect');
const isFarmer = user.role === 'farmer';

/* Seed top-bar instantly from cached user (before API returns) */
(function() {
  const init = user.name.charAt(0).toUpperCase();
  document.getElementById('topAvatar').textContent = init;
  document.getElementById('topName').textContent   = user.name.split(' ')[0];
  document.getElementById('sfAvatar').textContent  = init;
  document.getElementById('sfName').textContent    = user.name;
  document.getElementById('sfRole').textContent    = isFarmer ? '🌾 Farmer' : '🛒 Buyer';
})();

/* ── Star picker ── */
let pendingReviewOrder = null;
let selectedStar = 5;

function pickStar(n) {
  selectedStar = n;
  document.getElementById('reviewRating').value = n;
  document.querySelectorAll('.star-opt').forEach((s, i) => {
    s.textContent     = i < n ? '★' : '☆';
    s.style.color     = i < n ? 'var(--harvest)' : 'var(--subtext)';
    s.style.transform = i < n ? 'scale(1.1)' : 'scale(1)';
  });
}
pickStar(5);

/* ── Load dashboard data ── */
async function loadDash() {
  const [summaryRes, ordersRes, pendingRes, meRes] = await Promise.all([
    apiFetch('/orders/summary/me'),
    apiFetch('/orders?limit=8'),
    apiFetch('/reviews/pending'),
    apiFetch('/auth/me')
  ]);

  const summary = summaryRes.ok ? summaryRes.data.data                   : {};
  const orders  = ordersRes.ok  ? ordersRes.data.data.orders             : [];
  const pending = pendingRes.ok ? pendingRes.data.data.pending_reviews   : [];
  const me      = meRes.ok      ? meRes.data.data.user                   : user;
  const profile = me.profile || {};
  const revenue = isFarmer ? summary.total_revenue : summary.total_spent;

  /* ── Top bar & sidebar footer ── */
  const init = me.name.charAt(0).toUpperCase();
  document.getElementById('topAvatar').textContent = init;
  document.getElementById('topName').textContent   = me.name.split(' ')[0];
  document.getElementById('sfAvatar').textContent  = init;
  document.getElementById('sfName').textContent    = me.name;
  document.getElementById('sfRole').innerHTML =
    `<span class="sf-stars">${'★'.repeat(Math.round(profile.rating||0))}${'☆'.repeat(5-Math.round(profile.rating||0))}</span> ${Number(profile.rating||0).toFixed(1)}`;

  /* pending-review badge */
  if (pending.length > 0) {
    const el = document.getElementById('navReviews');
    el.innerHTML = `<span class="nav-icon">⭐</span> Reviews <span class="nav-badge badge-gold">${pending.length}</span>`;
  }

  /* notification dot for pending orders */
  if ((summary.pending || 0) > 0) document.getElementById('notifDot').style.display = '';

  /* wallet balance */
  const bal = profile.wallet_balance ?? me.wallet_balance ?? null;
  document.getElementById('walletBal').textContent = bal !== null ? 'KSh ' + fmtPrice(bal) : 'KSh —';

  /* ── Hero ── */
  document.getElementById('dashHero').innerHTML = `
    <div class="dash-hero">
      <div class="hero-inner">
        <div class="hero-left">
          <div class="hero-greeting">${isFarmer ? '🌾 Farmer Dashboard' : '🛒 Buyer Dashboard'}</div>
          <div class="hero-name">Welcome back,<br>${me.name.split(' ')[0]}.</div>
          <div class="hero-sub">${isFarmer ? ((profile.farm_name ? profile.farm_name + ' · ' : '')) : ''}${me.county || ''}</div>
          <div class="hero-avatar-wrap">
            <div class="hero-avatar">${me.name.charAt(0)}</div>
            <div class="hero-badge">${me.is_verified ? '✓ Verified' : isFarmer ? '🌱 Farmer' : '🛒 Buyer'}</div>
            ${pending.length > 0 ? `<div class="hero-badge gold-badge">⭐ ${pending.length} review${pending.length > 1 ? 's' : ''} pending</div>` : ''}
          </div>
        </div>
        <a href="/pages/settings.html" class="hero-edit-link">Edit profile →</a>
      </div>
      <div class="stats-strip">
        <div class="stat-cell">
          <div class="stat-cell-icon">🌿</div>
          <div class="stat-num">${summary.active_listings ?? summary.total_listings ?? 0}</div>
          <div class="stat-label">Active Listings</div>
        </div>
        <div class="stat-cell">
          <div class="stat-cell-icon">📦</div>
          <div class="stat-num">${summary.total_orders || 0}</div>
          <div class="stat-label">Total Orders</div>
        </div>
        <div class="stat-cell">
          <div class="stat-cell-icon">✅</div>
          <div class="stat-num">${summary.delivered || 0}</div>
          <div class="stat-label">Completed</div>
        </div>
        <div class="stat-cell">
          <div class="stat-cell-icon">${isFarmer ? '💰' : '🛍️'}</div>
          <div class="stat-num gold">KSh ${fmtPrice(revenue || 0)}</div>
          <div class="stat-label">${isFarmer ? 'Total Revenue' : 'Total Spent'}</div>
        </div>
      </div>
    </div>`;

  /* ── Main ── */
  document.getElementById('dashMain').innerHTML = `
    <div class="alert-banner">
      <span>🌱</span>
      <div><strong>Upgrade to Pro</strong> — get priority listing placement and reach 3× more buyers in your county.</div>
      <button class="alert-close" onclick="this.closest('.alert-banner').style.display='none'">✕</button>
    </div>

    <div class="quick-row">
      ${isFarmer
        ? `<a href="/pages/my-listings.html" class="qbtn qbtn-primary">＋ Post Listing</a>
           <a href="/pages/orders.html"      class="qbtn qbtn-soft">📦 All Orders</a>
           <a href="/pages/prices.html"      class="qbtn qbtn-soft">📊 Prices</a>
           <a href="/pages/my-listings.html" class="qbtn qbtn-soft">🌿 My Listings</a>`
        : `<a href="/pages/browse.html"      class="qbtn qbtn-primary">🛒 Browse Produce</a>
           <a href="/pages/orders.html"      class="qbtn qbtn-soft">📦 My Orders</a>
           <a href="/pages/prices.html"      class="qbtn qbtn-soft">📊 Prices</a>`}
    </div>

    ${pending.length > 0 ? `
    <div class="review-section">
      <div class="sec-head"><div class="sec-title">⭐ Reviews to Write</div></div>
      ${pending.map(p => `
        <div class="review-card">
          <div class="rc-icon">👤</div>
          <div style="flex:1;min-width:0">
            <div class="rc-name">${p.reviewee_name}</div>
            <div class="rc-sub">${p.items_summary || 'Order #' + p.order_id.slice(0,8).toUpperCase()}</div>
          </div>
          <button class="qbtn qbtn-soft" style="padding:0.45rem 1rem;font-size:0.78rem;border-radius:8px"
            onclick="openReview('${p.order_id}','${p.reviewee_id}','${p.reviewee_name}')">Write Review →</button>
        </div>`).join('')}
    </div>` : ''}

    <div class="orders-section">
      <div class="sec-head">
        <div class="sec-title">Recent Orders</div>
        <a href="/pages/orders.html" class="sec-link">View all →</a>
      </div>
      ${orders.length === 0
        ? `<div class="empty-state">
             <div class="icon">${isFarmer ? '🌾' : '🛒'}</div>
             <h3>No orders yet</h3>
             <p>${isFarmer ? "When buyers place orders, they'll appear here." : 'Browse listings and place your first order.'}</p>
             <a href="${isFarmer ? '/pages/my-listings.html' : '/pages/browse.html'}" class="btn-primary" style="margin-top:1.25rem">${isFarmer ? 'Post a Listing' : 'Browse Produce'}</a>
           </div>`
        : orders.map(o => buildOrderCard(o)).join('')}
    </div>`;

  /* ── Right sidebar ── */
  document.getElementById('dashSidebar').innerHTML = `
    <div class="sidebar-card">
      <div class="sc-label">My Profile</div>
      <div class="farm-profile">
        <div class="fp-avatar">${me.name.charAt(0)}</div>
        <div class="fp-name">${me.name}</div>
        <div class="fp-role">${isFarmer ? (profile.farm_name || 'Farmer') : (profile.business_name || 'Buyer')} · ${me.county || ''}</div>
        ${profile.rating > 0 ? `
        <div class="fp-rating">
          <span class="fp-stars">${'★'.repeat(Math.round(profile.rating))}${'☆'.repeat(5-Math.round(profile.rating))}</span>
          <span>${Number(profile.rating).toFixed(1)} (${profile.total_reviews || 0} reviews)</span>
        </div>` : ''}
        <div class="fp-stats">
          ${isFarmer
            ? `<div class="fp-stat"><div class="fp-stat-num">${profile.total_sales || 0}</div><div class="fp-stat-label">Total Sales</div></div>
               <div class="fp-stat"><div class="fp-stat-num">${summary.total_orders || 0}</div><div class="fp-stat-label">Orders</div></div>`
            : `<div class="fp-stat"><div class="fp-stat-num">${summary.total_orders || 0}</div><div class="fp-stat-label">Orders</div></div>
               <div class="fp-stat"><div class="fp-stat-num">${summary.delivered || 0}</div><div class="fp-stat-label">Completed</div></div>`}
        </div>
        <a href="/pages/settings.html" class="fp-edit-btn">Edit Profile</a>
      </div>
    </div>

    <div class="sidebar-card">
      <div class="sc-label">Quick Links</div>
      <div class="sidebar-links">
        ${isFarmer ? `
        <a href="/pages/my-listings.html" class="sidebar-link"><div class="sl-icon" style="background:#E8F4E8">🌿</div> My Listings</a>
        <a href="/pages/orders.html"      class="sidebar-link"><div class="sl-icon" style="background:#EFF6FF">📦</div> Incoming Orders</a>
        <a href="/pages/prices.html"      class="sidebar-link"><div class="sl-icon" style="background:#FFFBEB">📊</div> Market Prices</a>
        <a href="/pages/settings.html"    class="sidebar-link"><div class="sl-icon" style="background:var(--mist)">⚙️</div> Account Settings</a>
        ` : `
        <a href="/pages/browse.html"      class="sidebar-link"><div class="sl-icon" style="background:#E8F4E8">🛒</div> Browse Produce</a>
        <a href="/pages/orders.html"      class="sidebar-link"><div class="sl-icon" style="background:#EFF6FF">📦</div> My Orders</a>
        <a href="/pages/prices.html"      class="sidebar-link"><div class="sl-icon" style="background:#FFFBEB">📊</div> Market Prices</a>
        <a href="/pages/settings.html"    class="sidebar-link"><div class="sl-icon" style="background:var(--mist)">⚙️</div> Account Settings</a>
        `}
      </div>
    </div>

    ${summary.total_orders > 0 ? `
    <div class="sidebar-card">
      <div class="sc-label">Order Breakdown</div>
      ${buildStatusBar('Pending',   summary.pending   || 0, summary.total_orders, 'dot-pending')}
      ${buildStatusBar('Confirmed', summary.confirmed || 0, summary.total_orders, 'dot-confirmed')}
      ${buildStatusBar('Delivered', summary.delivered || 0, summary.total_orders, 'dot-delivered')}
      ${buildStatusBar('Cancelled', summary.cancelled || 0, summary.total_orders, 'dot-cancelled')}
    </div>` : ''}`;

  /* Animate breakdown bars after DOM is painted */
  requestAnimationFrame(() => {
    document.querySelectorAll('.br-fill[data-pct]').forEach(el => {
      el.style.width = el.dataset.pct + '%';
    });
  });
}

/* ── Helpers ── */
function buildStatusBar(label, count, total, dotClass) {
  const pct = total > 0 ? Math.round(count / total * 100) : 0;
  return `<div class="breakdown-row">
    <div class="br-head">
      <div class="br-label"><span class="activity-dot ${dotClass}"></span>${label}</div>
      <span class="br-count">${count}</span>
    </div>
    <div class="br-track">
      <div class="br-fill ${label.toLowerCase()}" style="width:0%" data-pct="${pct}"></div>
    </div>
  </div>`;
}

function buildOrderCard(o) {
  const party      = isFarmer ? o.buyer_name : (o.farm_name || o.farmer_name);
  const partyLabel = isFarmer ? '← from' : '→ to';
  const actions    = buildOrderActions(o);
  return `<div class="order-card">
    <div class="order-card-left">
      <div class="oc-top">
        <span class="oc-id">#${o.id.slice(0,8).toUpperCase()}</span>
        ${statusBadge(o.status)}
        <span class="oc-amount">KSh ${fmtPrice(o.total_amount)}</span>
      </div>
      <div class="oc-meta">
        <span>${partyLabel} <strong style="color:var(--earth)">${party}</strong></span>
        <span class="oc-dot">·</span>
        <span>${fmtDate(o.created_at)}</span>
        ${o.item_count ? `<span class="oc-dot">·</span><span>${o.item_count} item${o.item_count > 1 ? 's' : ''}</span>` : ''}
      </div>
      ${actions ? `<div class="oc-actions">${actions}</div>` : ''}
    </div>
    <div class="oc-right">
      <a href="/pages/orders.html?id=${o.id}" class="oc-details-link">Details →</a>
    </div>
  </div>`;
}

function buildOrderActions(o) {
  const btns = [];
  if (isFarmer) {
    if (o.status === 'pending')   btns.push(`<button class="oa-btn oa-confirm" onclick="doAction('${o.id}','confirm')">✓ Confirm</button>`);
    if (o.status === 'confirmed') btns.push(`<button class="oa-btn oa-ready"   onclick="doAction('${o.id}','ready')">📦 Mark Ready</button>`);
    if (o.status === 'ready')     btns.push(`<button class="oa-btn oa-transit"  onclick="doAction('${o.id}','in-transit')">🚚 Dispatch</button>`);
  } else {
    if (['ready','in_transit'].includes(o.status))
      btns.push(`<button class="oa-btn oa-deliver" onclick="doAction('${o.id}','delivered')">✓ Confirm Receipt</button>`);
  }
  if (!['delivered','cancelled'].includes(o.status))
    btns.push(`<button class="oa-btn oa-cancel" onclick="doAction('${o.id}','cancel')">Cancel</button>`);
  return btns.join('');
}

/* statusBadge — uses CSS class system matching original shared.js contract */
function statusBadge(s) {
  const labels = {
    pending:      '⏳ Pending',
    confirmed:    '✓ Confirmed',
    ready:        '📦 Ready',
    'in-transit': '🚚 In Transit',
    in_transit:   '🚚 In Transit',
    delivered:    '✅ Delivered',
    cancelled:    '✕ Cancelled',
  };
  const cls = 'status-' + s.replace(/_/g, '-');
  return `<span class="status-badge ${cls}">${labels[s] || s}</span>`;
}

/* ── Order actions ── */
async function doAction(id, action) {
  const { ok, data } = await apiFetch(`/orders/${id}/${action}`, { method:'PATCH' });
  if (ok) { toast('Order updated ✅', 'success'); loadDash(); }
  else toast(data.message || 'Failed', 'error');
}

/* ── Review modal ── */
function openReview(orderId, revieweeId, name) {
  pendingReviewOrder = { orderId, revieweeId };
  document.getElementById('reviewFor').textContent    = `Reviewing your experience with ${name}`;
  document.getElementById('reviewError').style.display = 'none';
  document.getElementById('reviewComment').value      = '';
  pickStar(5);
  document.getElementById('reviewModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeReviewModal() {
  document.getElementById('reviewModal').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('reviewModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeReviewModal();
});

async function submitReview() {
  if (!pendingReviewOrder) return;
  const btn = document.getElementById('reviewSubmitBtn');
  btn.disabled = true; btn.textContent = 'Submitting…';
  const { ok, data } = await apiFetch('/reviews', {
    method: 'POST',
    body: JSON.stringify({
      order_id: pendingReviewOrder.orderId,
      rating:   parseInt(document.getElementById('reviewRating').value),
      comment:  document.getElementById('reviewComment').value.trim()
    })
  });
  if (ok) {
    closeReviewModal();
    toast('Review submitted! ⭐', 'success');
    loadDash();
  } else {
    const errEl = document.getElementById('reviewError');
    errEl.textContent   = data.message || 'Could not submit review.';
    errEl.style.display = 'block';
    btn.disabled        = false;
    btn.textContent     = 'Submit Review';
  }
}

/* ── Mobile sidebar ── */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

/* ── Boot ── */
loadDash();
</script>
