<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard — FarmAd</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --earth:    #1c2e0e;
  --leaf:     #3a7d2c;
  --leaf-dim: #2d6122;
  --harvest:  #e8a020;
  --red:      #c0392b;
  --cream:    #f2ede4;
  --mist:     #ede8df;
  --white:    #ffffff;
  --border:   rgba(45,27,14,0.09);
  --subtext:  #7a6e5a;
  --sidebar-w: 240px;
  --topbar-h:  60px;
  --radius:    14px;
  --radius-lg: 20px;
}
body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--earth); display: flex; flex-direction: column; min-height: 100vh; }

/* ── Top Bar ─────────────────────────────────────────────────────────────── */
.topbar { position: fixed; top: 0; left: 0; right: 0; height: var(--topbar-h); background: var(--white); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem 0 calc(var(--sidebar-w) + 1.5rem); z-index: 100; }
.topbar-nav { position: fixed; top: 0; left: calc(var(--sidebar-w) + 1.5rem); height: var(--topbar-h); display: flex; align-items: center; gap: 0.1rem; z-index: 101; }
.topbar-nav-link { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.4rem 0.65rem; border-radius: 8px; font-size: 0.85rem; font-weight: 600; color: var(--subtext); text-decoration: none; transition: all 0.15s; }
.topbar-nav-link:hover { background: var(--mist); color: var(--earth); }
.topbar-nav-link.active { background: #e8f4e8; color: var(--leaf); }
.topbar-left { display: flex; align-items: center; gap: 0.75rem; }
.topbar-hamburger { font-size: 1.2rem; cursor: pointer; color: var(--subtext); background: none; border: none; line-height: 1; }
.topbar-wallet { display: flex; align-items: center; gap: 0.4rem; background: var(--leaf); color: white; font-size: 0.75rem; font-weight: 700; padding: 0.3rem 0.9rem; border-radius: 100px; letter-spacing: 0.2px; }
.topbar-right { display: flex; align-items: center; gap: 1.1rem; }
.topbar-icon { font-size: 1.1rem; color: var(--subtext); cursor: pointer; position: relative; }
.topbar-badge { position: absolute; top: -4px; right: -5px; width: 16px; height: 16px; border-radius: 50%; background: var(--red); color: white; font-size: 0.52rem; font-weight: 700; display: flex; align-items: center; justify-content: center; border: 2px solid var(--white); }
.topbar-profile { display: flex; align-items: center; gap: 0.55rem; cursor: pointer; }
.topbar-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--leaf), #1c400f); color: white; font-family: 'Playfair Display', serif; font-size: 0.9rem; font-weight: 700; display: flex; align-items: center; justify-content: center; }
.topbar-name { font-size: 0.85rem; font-weight: 600; color: var(--earth); }
.topbar-pill { font-size: 0.7rem; font-weight: 700; padding: 0.22rem 0.65rem; border-radius: 7px; background: #e8f4e8; color: var(--leaf); border: 1px solid rgba(58,125,44,0.22); }
.topbar-logout { font-size: 0.78rem; font-weight: 600; color: var(--subtext); background: none; border: none; cursor: pointer; padding: 0.3rem 0.7rem; border-radius: 8px; transition: all 0.15s; }
.topbar-logout:hover { background: #fee2e2; color: #991b1b; }

/* ── Sidebar ─────────────────────────────────────────────────────────────── */
.sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar-w); background: var(--earth); display: flex; flex-direction: column; z-index: 200; overflow-y: auto; }
.sidebar-logo { height: var(--topbar-h); display: flex; align-items: center; padding: 0 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
.logo-text { font-family: 'Playfair Display', serif; font-size: 1.25rem; font-weight: 900; color: white; letter-spacing: -0.5px; }
.logo-text span { color: var(--harvest); }
.sidebar-nav { flex: 1; padding: 1.25rem 0.75rem; display: flex; flex-direction: column; gap: 0.1rem; }
.nav-label { font-size: 0.58rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.22); padding: 0.85rem 0.75rem 0.35rem; margin-top: 0.25rem; }
.nav-item { display: flex; align-items: center; justify-content: space-between; padding: 0.6rem 0.75rem; border-radius: 10px; cursor: pointer; text-decoration: none; color: rgba(255,255,255,0.48); font-size: 0.85rem; font-weight: 500; transition: all 0.15s; position: relative; }
.nav-item:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.82); }
.nav-item.active { background: rgba(255,255,255,0.1); color: white; font-weight: 600; }
.nav-item.active::before { content: ''; position: absolute; left: -0.75rem; top: 20%; bottom: 20%; width: 3px; border-radius: 0 3px 3px 0; background: var(--harvest); }
.nav-item-left { display: flex; align-items: center; gap: 0.65rem; }
.nav-icon { font-size: 1rem; width: 20px; text-align: center; }
.nav-badge { min-width: 20px; height: 20px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 0.63rem; font-weight: 700; padding: 0 5px; }
.badge-green { background: var(--leaf); color: white; }
.badge-gold  { background: var(--harvest); color: white; }
.badge-red   { background: var(--red); color: white; }
.sidebar-footer { padding: 1rem 1.25rem; border-top: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; gap: 0.65rem; }
.sf-avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--leaf), #1c400f); color: white; font-family: 'Playfair Display', serif; font-size: 0.9rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.sf-name { font-size: 0.8rem; font-weight: 600; color: rgba(255,255,255,0.82); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sf-role { font-size: 0.65rem; color: rgba(255,255,255,0.28); }
.sf-rating { font-size: 0.7rem; color: var(--harvest); font-weight: 700; margin-top: 0.1rem; }

/* ── Page Shell ──────────────────────────────────────────────────────────── */
.page-shell { margin-left: var(--sidebar-w); margin-top: var(--topbar-h); min-height: calc(100vh - var(--topbar-h)); background: var(--cream); }

/* ── Hero ────────────────────────────────────────────────────────────────── */
.dash-hero { background: linear-gradient(135deg, var(--earth) 0%, #1c400f 100%); padding: 2.5rem 6vw 0; position: relative; overflow: hidden; }
.dash-hero::before { content: ''; position: absolute; top: -60px; right: -60px; width: 320px; height: 320px; border-radius: 50%; background: radial-gradient(circle, rgba(232,160,32,0.12) 0%, transparent 70%); pointer-events: none; }
.dash-hero::after { content: ''; position: absolute; bottom: -40px; left: 30%; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, rgba(58,125,44,0.18) 0%, transparent 70%); pointer-events: none; }
.hero-inner { position: relative; z-index: 1; display: flex; align-items: flex-end; justify-content: space-between; gap: 2rem; flex-wrap: wrap; }
.hero-left { padding-bottom: 2.5rem; }
.hero-greeting { font-size: 0.7rem; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: var(--harvest); margin-bottom: 0.5rem; }
.hero-name { font-family: 'Playfair Display', serif; font-size: clamp(1.9rem,3.5vw,2.7rem); font-weight: 900; color: white; line-height: 1.1; }
.hero-sub { font-size: 0.88rem; color: rgba(255,255,255,0.45); margin-top: 0.4rem; font-weight: 300; }
.hero-avatar-wrap { display: flex; align-items: center; gap: 0.85rem; margin-top: 1.25rem; flex-wrap: wrap; }
.hero-avatar { width: 52px; height: 52px; border-radius: 50%; background: var(--harvest); color: var(--earth); font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 900; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 2px solid rgba(255,255,255,0.15); }
.hero-badge { display: inline-flex; align-items: center; gap: 0.35rem; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.18); border-radius: 100px; padding: 0.3rem 0.85rem; font-size: 0.74rem; font-weight: 600; color: rgba(255,255,255,0.8); }
.hero-edit-link { font-size: 0.78rem; color: rgba(255,255,255,0.35); text-decoration: none; padding-bottom: 2.5rem; align-self: flex-end; transition: color 0.2s; }
.hero-edit-link:hover { color: var(--harvest); }
.stats-strip { display: grid; grid-template-columns: repeat(4,1fr); background: rgba(0,0,0,0.22); border-top: 1px solid rgba(255,255,255,0.07); position: relative; z-index: 1; }
.stat-cell { padding: 1.25rem 1.5rem; border-right: 1px solid rgba(255,255,255,0.07); position: relative; }
.stat-cell:last-child { border-right: none; }
.stat-cell-num { font-family: 'Playfair Display', serif; font-size: 1.9rem; font-weight: 900; color: white; line-height: 1; }
.stat-cell-num.gold { color: var(--harvest); }
.stat-cell-label { font-size: 0.7rem; color: rgba(255,255,255,0.38); margin-top: 0.3rem; font-weight: 500; letter-spacing: 0.3px; }
.stat-cell-icon { position: absolute; top: 1rem; right: 1.25rem; font-size: 1.05rem; opacity: 0.25; }

/* ── Alert banner ───────────────────────────────────────────────────────── */
.alert-banner { background: #fffbeb; border: 1px solid rgba(240,165,0,0.28); border-radius: var(--radius); padding: 0.9rem 1.1rem; display: flex; align-items: flex-start; gap: 0.75rem; font-size: 0.82rem; color: #7a5800; margin-bottom: 2rem; }
.alert-icon { width: 28px; height: 28px; border-radius: 8px; background: var(--harvest); color: white; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; flex-shrink: 0; font-weight: 700; }
.alert-close { margin-left: auto; background: none; border: none; color: var(--subtext); cursor: pointer; font-size: 1rem; padding: 0; line-height: 1; }
.alert-link { color: var(--leaf); font-weight: 600; text-decoration: none; }
.alert-link:hover { text-decoration: underline; }

/* ── Main layout ────────────────────────────────────────────────────────── */
.dash-wrap { display: grid; grid-template-columns: 1fr 320px; gap: 2rem; padding: 2.25rem 6vw 4rem; align-items: start; }

/* ── Quick Buttons ──────────────────────────────────────────────────────── */
.quick-row { display: flex; gap: 0.7rem; flex-wrap: wrap; margin-bottom: 2rem; }
.qbtn { display: inline-flex; align-items: center; gap: 0.45rem; padding: 0.65rem 1.2rem; border-radius: 100px; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 0.85rem; cursor: pointer; text-decoration: none; transition: all 0.2s; border: none; }
.qbtn-primary { background: var(--leaf); color: white; box-shadow: 0 4px 14px rgba(58,125,44,0.25); }
.qbtn-primary:hover { background: var(--leaf-dim); transform: translateY(-1px); }
.qbtn-soft { background: white; color: var(--earth); border: 1.5px solid rgba(45,27,14,0.12); }
.qbtn-soft:hover { border-color: var(--leaf); color: var(--leaf); }

/* ── Section header ─────────────────────────────────────────────────────── */
.sec-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
.sec-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 900; color: var(--earth); }
.sec-link { font-size: 0.8rem; color: var(--leaf); font-weight: 600; text-decoration: none; }
.sec-link:hover { text-decoration: underline; }

/* ── Order Cards ────────────────────────────────────────────────────────── */
.order-card { background: white; border-radius: var(--radius); border: 1px solid var(--border); padding: 1rem 1.25rem; margin-bottom: 0.75rem; display: grid; grid-template-columns: 1fr auto; gap: 0.75rem; align-items: center; transition: box-shadow 0.2s, transform 0.2s; }
.order-card:hover { box-shadow: 0 4px 20px rgba(45,27,14,0.08); transform: translateY(-1px); }
.oc-top { display: flex; align-items: center; gap: 0.55rem; flex-wrap: wrap; margin-bottom: 0.3rem; }
.oc-id { font-size: 0.68rem; font-family: monospace; color: rgba(107,82,64,0.5); background: var(--mist); padding: 0.15rem 0.5rem; border-radius: 6px; }
.oc-amount { font-weight: 700; color: var(--earth); font-size: 0.95rem; }
.oc-meta { font-size: 0.76rem; color: var(--subtext); display: flex; align-items: center; gap: 0.45rem; flex-wrap: wrap; }
.oc-dot { opacity: 0.3; }
.oc-detail-link { font-size: 0.75rem; color: var(--leaf); text-decoration: none; font-weight: 600; white-space: nowrap; }
.oc-detail-link:hover { text-decoration: underline; }
.badge { display: inline-flex; align-items: center; gap: 0.25rem; font-size: 0.68rem; font-weight: 700; padding: 0.22rem 0.65rem; border-radius: 100px; white-space: nowrap; }
.badge-delivered { background: #dcfce7; color: #166534; }
.badge-confirmed { background: #dbeafe; color: #1e40af; }
.badge-pending   { background: #fef3c7; color: #92400e; }
.badge-transit   { background: #ede9fe; color: #4c1d95; }
.badge-cancelled { background: #fee2e2; color: #991b1b; }
.badge-ready     { background: #dbeafe; color: #1e40af; }
.oa-btn { padding: 0.32rem 0.8rem; border-radius: 7px; border: none; font-family: 'DM Sans', sans-serif; font-size: 0.72rem; font-weight: 700; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.oa-confirm { background: var(--leaf); color: white; }
.oa-confirm:hover { background: var(--leaf-dim); }
.oa-ready   { background: #dbeafe; color: #1e40af; }
.oa-ready:hover { background: #bfdbfe; }
.oa-transit { background: #e0e7ff; color: #3730a3; }
.oa-transit:hover { background: #c7d2fe; }
.oa-deliver { background: #dcfce7; color: #166534; }
.oa-deliver:hover { background: #bbf7d0; }
.oa-cancel  { background: #fee2e2; color: #991b1b; }
.oa-cancel:hover  { background: #fecaca; }

/* ── Review card ────────────────────────────────────────────────────────── */
.review-card { background: linear-gradient(135deg,#fffbf0,#fff8e6); border: 1px solid rgba(232,160,32,0.2); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 1rem; }
.rc-icon { font-size: 1.4rem; flex-shrink: 0; }
.rc-name { font-weight: 700; color: var(--earth); font-size: 0.88rem; }
.rc-sub  { font-size: 0.73rem; color: var(--subtext); margin-top: 0.1rem; }

/* ── Sidebar Cards ──────────────────────────────────────────────────────── */
.sidebar-card { background: white; border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 1.5rem; margin-bottom: 1.25rem; }
.sidebar-card-title { font-size: 0.68rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--subtext); margin-bottom: 1.1rem; }
.farm-profile { text-align: center; padding: 0.25rem 0 0; }
.fp-avatar { width: 68px; height: 68px; border-radius: 50%; background: linear-gradient(135deg, var(--leaf), #1c400f); color: white; font-family: 'Playfair Display', serif; font-size: 1.7rem; font-weight: 900; display: flex; align-items: center; justify-content: center; margin: 0 auto 0.75rem; }
.fp-name { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 900; color: var(--earth); }
.fp-role { font-size: 0.75rem; color: var(--subtext); margin-top: 0.2rem; }
.fp-rating { display: flex; align-items: center; justify-content: center; gap: 0.4rem; margin: 0.5rem 0 0.25rem; font-size: 0.82rem; color: var(--subtext); }
.fp-rating-stars { color: var(--harvest); font-size: 0.9rem; letter-spacing: 1.5px; }
.fp-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin: 1.1rem 0 1rem; }
.fp-stat { background: var(--mist); border-radius: 12px; padding: 0.8rem; text-align: center; }
.fp-stat-num { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 900; color: var(--earth); }
.fp-stat-label { font-size: 0.65rem; color: var(--subtext); margin-top: 0.15rem; }
.fp-edit-btn { display: block; width: 100%; padding: 0.65rem; background: var(--mist); border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.82rem; color: var(--earth); cursor: pointer; text-decoration: none; text-align: center; transition: background 0.2s; }
.fp-edit-btn:hover { background: #e0d8c8; }
.sidebar-links { display: flex; flex-direction: column; gap: 0.25rem; }
.sidebar-link { display: flex; align-items: center; gap: 0.75rem; padding: 0.65rem 0.85rem; border-radius: 10px; text-decoration: none; color: var(--subtext); font-size: 0.86rem; font-weight: 500; transition: all 0.15s; }
.sidebar-link:hover { background: var(--mist); color: var(--earth); }
.sidebar-link-icon { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
.activity-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-pending   { background: #f59e0b; }
.dot-confirmed { background: #3b82f6; }
.dot-delivered { background: #22c55e; }
.dot-cancelled { background: #ef4444; }
.bar-track { background: var(--mist); border-radius: 100px; height: 5px; overflow: hidden; margin-top: 0.3rem; }
.bar-fill  { height: 100%; border-radius: 100px; transition: width 0.8s ease; width: 0; }
.bar-gold  { background: #f59e0b; }
.bar-blue  { background: #3b82f6; }
.bar-green { background: #22c55e; }
.bar-red   { background: #ef4444; }

/* ── Earnings / Spending Breakdown ──────────────────────────────────────── */
.breakdown-card { background: white; border-radius: var(--radius); border: 1px solid var(--border); padding: 1.25rem 1.5rem; margin-bottom: 2rem; }
.breakdown-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 0.75rem; margin-top: 1rem; }
.breakdown-cell { background: var(--mist); border-radius: 12px; padding: 0.9rem 1rem; }
.breakdown-cell-label { font-size: 0.68rem; font-weight: 600; color: var(--subtext); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.3rem; }
.breakdown-cell-val { font-family: 'Playfair Display', serif; font-size: 1.25rem; font-weight: 900; color: var(--earth); }
.breakdown-cell-val.gold { color: var(--harvest); }
.breakdown-cell-sub { font-size: 0.7rem; color: var(--subtext); margin-top: 0.15rem; }

/* ── Rating & Reviews ────────────────────────────────────────────────────── */
.rating-hero { display: flex; align-items: center; gap: 1.25rem; padding: 0.5rem 0 1.25rem; border-bottom: 1px solid var(--border); margin-bottom: 1.1rem; }
.rating-big { font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 900; color: var(--earth); line-height: 1; }
.rating-stars-lg { color: var(--harvest); font-size: 1.1rem; letter-spacing: 2px; }
.rating-count { font-size: 0.75rem; color: var(--subtext); margin-top: 0.2rem; }
.star-bar-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.45rem; font-size: 0.75rem; color: var(--subtext); }
.star-bar-label { width: 20px; text-align: right; flex-shrink: 0; }
.star-bar-track { flex: 1; height: 6px; background: var(--mist); border-radius: 100px; overflow: hidden; }
.star-bar-fill { height: 100%; border-radius: 100px; background: var(--harvest); transition: width 0.8s ease; width: 0; }
.star-bar-count { width: 24px; flex-shrink: 0; text-align: right; font-weight: 600; color: var(--earth); }
.inline-review { padding: 0.85rem 0; border-bottom: 1px solid var(--border); }
.inline-review:last-child { border-bottom: none; padding-bottom: 0; }
.ir-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.3rem; }
.ir-stars { color: var(--harvest); font-size: 0.78rem; letter-spacing: 1px; }
.ir-name { font-size: 0.78rem; font-weight: 600; color: var(--earth); }
.ir-date { font-size: 0.7rem; color: var(--subtext); margin-left: auto; }
.ir-comment { font-size: 0.8rem; color: var(--subtext); line-height: 1.5; }

/* ── Saved / Browsed Listings ────────────────────────────────────────────── */
.listing-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 0.75rem; margin-top: 1rem; }
.listing-mini { background: var(--mist); border-radius: 12px; padding: 0.9rem 1rem; display: flex; flex-direction: column; gap: 0.3rem; border: 1px solid var(--border); transition: box-shadow 0.2s, transform 0.2s; }
.listing-mini:hover { box-shadow: 0 4px 16px rgba(45,27,14,0.08); transform: translateY(-1px); }
.listing-mini-name { font-size: 0.85rem; font-weight: 700; color: var(--earth); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.listing-mini-farm { font-size: 0.72rem; color: var(--subtext); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.listing-mini-price { font-size: 0.82rem; font-weight: 700; color: var(--leaf); margin-top: 0.2rem; }
.listing-mini-reorder { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.7rem; font-weight: 700; color: var(--leaf); background: #e8f4e8; border: none; border-radius: 6px; padding: 0.25rem 0.6rem; cursor: pointer; margin-top: 0.4rem; text-decoration: none; transition: background 0.15s; }
.listing-mini-reorder:hover { background: #d1ead1; }

/* ── Empty state ────────────────────────────────────────────────────────── */
.empty-state { text-align: center; padding: 3rem 1rem; color: var(--subtext); }
.empty-state .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
.empty-state h3 { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--earth); margin-bottom: 0.4rem; }
.empty-state p { font-size: 0.85rem; }
.btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.6rem 1.2rem; border-radius: 100px; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 0.85rem; cursor: pointer; text-decoration: none; transition: all 0.2s; border: none; }
.btn-primary { background: var(--leaf); color: white; }
.btn-primary:hover { background: var(--leaf-dim); }
.btn-sm { padding: 0.5rem 1rem; font-size: 0.8rem; }

/* ── Skeleton loaders ───────────────────────────────────────────────────── */
.skeleton { background: linear-gradient(90deg, var(--mist) 25%, #e4ddd3 50%, var(--mist) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: var(--radius); }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ── Responsive ─────────────────────────────────────────────────────────── */
@media (max-width: 1020px) { .dash-wrap { grid-template-columns: 1fr; } }
@media (max-width: 640px) {
  .stats-strip { grid-template-columns: 1fr 1fr; }
  .stat-cell:nth-child(2) { border-right: none; }
  .stat-cell { border-bottom: 1px solid rgba(255,255,255,0.07); }
  .stat-cell-num { font-size: 1.4rem; }
  .sidebar { transform: translateX(-100%); transition: transform 0.25s ease; }
  .sidebar.open { transform: translateX(0); }
  .topbar { padding-left: 1.5rem; }
  .topbar-nav { left: 1.5rem; }
  .page-shell { margin-left: 0; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 150; }
  .overlay.visible { display: block; }
}
</style>
</head>
<body>

<!-- ── Sidebar ─────────────────────────────────────────────────────────── -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <span style="font-size:1.2rem;margin-right:0.5rem">🌿</span>
    <span class="logo-text">Farm<span>Ad</span></span>
  </div>
  <div class="sidebar-nav" id="sidebarNav">
    <!-- filled by JS based on role -->
  </div>
  <div class="sidebar-footer" id="sidebarFooter">
    <!-- filled by JS -->
  </div>
</nav>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<!-- ── Top Bar ─────────────────────────────────────────────────────────── -->
<header class="topbar"></header>



<!-- ── Page Shell ──────────────────────────────────────────────────────── -->
<div class="page-shell">
  <!-- Hero — filled by JS -->
  <div id="dashHero">
    <div class="dash-hero">
      <div class="hero-inner">
        <div class="hero-left" style="padding-bottom:2.5rem">
          <div class="skeleton" style="height:12px;width:140px;border-radius:6px;margin-bottom:0.6rem"></div>
          <div class="skeleton" style="height:40px;width:260px;border-radius:8px;margin-bottom:0.4rem"></div>
          <div class="skeleton" style="height:12px;width:180px;border-radius:6px"></div>
        </div>
      </div>
      <div class="stats-strip" style="opacity:0.4">
        <div class="stat-cell"></div><div class="stat-cell"></div>
        <div class="stat-cell"></div><div class="stat-cell"></div>
      </div>
    </div>
  </div>

  <!-- Main Grid -->
  <div class="dash-wrap">
    <main id="dashMain">
      <div style="display:flex;flex-direction:column;gap:1.25rem">
        <div class="skeleton" style="height:52px;border-radius:var(--radius)"></div>
        <div class="skeleton" style="height:44px;border-radius:100px;width:min(360px,100%)"></div>
        <div class="skeleton" style="height:120px;border-radius:var(--radius)"></div>
        <div class="skeleton" style="height:120px;border-radius:var(--radius)"></div>
      </div>
    </main>
    <aside id="dashSidebar">
      <div class="skeleton" style="height:280px;border-radius:var(--radius-lg);margin-bottom:1.25rem"></div>
      <div class="skeleton" style="height:160px;border-radius:var(--radius-lg)"></div>
    </aside>
  </div>
</div>

<!-- ── Review Modal ─────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="reviewModal">
  <div class="modal">
    <button class="modal-close" onclick="closeReviewModal()">✕</button>
    <div style="font-size:1.5rem;margin-bottom:0.5rem">⭐</div>
    <h3 style="font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:900;color:var(--earth);margin-bottom:0.25rem">Leave a Review</h3>
    <p style="font-size:0.83rem;color:var(--subtext);margin-bottom:1.5rem" id="reviewFor"></p>
    <div class="alert alert-error" id="reviewError"></div>
    <div class="form-group">
      <label>Your Rating</label>
      <div id="starPicker" style="display:flex;gap:0.4rem;margin-bottom:0.5rem">
        <span class="star-opt" data-v="1" onclick="pickStar(1)" style="font-size:1.8rem;cursor:pointer;transition:transform 0.1s">☆</span>
        <span class="star-opt" data-v="2" onclick="pickStar(2)" style="font-size:1.8rem;cursor:pointer;transition:transform 0.1s">☆</span>
        <span class="star-opt" data-v="3" onclick="pickStar(3)" style="font-size:1.8rem;cursor:pointer;transition:transform 0.1s">☆</span>
        <span class="star-opt" data-v="4" onclick="pickStar(4)" style="font-size:1.8rem;cursor:pointer;transition:transform 0.1s">☆</span>
        <span class="star-opt" data-v="5" onclick="pickStar(5)" style="font-size:1.8rem;cursor:pointer;transition:transform 0.1s">☆</span>
      </div>
      <input type="hidden" id="reviewRating" value="5">
    </div>
    <div class="form-group">
      <label>Comment <span style="font-weight:400;color:var(--subtext)">(optional)</span></label>
      <textarea id="reviewComment" rows="3" placeholder="Share your experience…" style="border:1.5px solid rgba(92,51,23,0.2);border-radius:12px;padding:0.7rem 1rem;font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;width:100%;resize:vertical;transition:border-color 0.2s" onfocus="this.style.borderColor='var(--leaf)'" onblur="this.style.borderColor='rgba(92,51,23,0.2)'"></textarea>
    </div>
    <button class="submit-btn" id="reviewSubmitBtn" onclick="submitReview()">Submit Review</button>
  </div>
</div>

<script src="/shared.js"></script>
<script>
/* ── Override nav — sidebar handles navigation on this page ── */
updateNav = function() {};

/* ── Topbar active link ── */
(function() {
  const path = window.location.pathname;
  document.querySelectorAll('.topbar-nav-link').forEach(link => {
    if (link.getAttribute('href') && path.includes(link.getAttribute('href').split('/').pop().replace('.html',''))) {
      link.classList.add('active');
    }
  });
})();

/* ── Auth ── */
const user = requireAuth();
if (!user) throw new Error('redirect');
const isFarmer = user.role === 'farmer';

let pendingReviewOrder = null;

/* ── Sidebar / topbar toggle ── */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('visible');
}

/* ── Star picker ── */
function pickStar(n) {
  document.getElementById('reviewRating').value = n;
  document.querySelectorAll('.star-opt').forEach((s, i) => {
    s.textContent = i < n ? '★' : '☆';
    s.style.color     = i < n ? 'var(--harvest)' : 'var(--subtext)';
    s.style.transform = i < n ? 'scale(1.1)' : 'scale(1)';
  });
}
pickStar(5);

/* ── Helpers ── */
function statusBadge(status) {
  const map = {
    pending:    ['badge-pending',   '⏳ Pending'],
    confirmed:  ['badge-confirmed', '● Confirmed'],
    ready:      ['badge-ready',     '📦 Ready'],
    'in-transit':  ['badge-transit',   '🚚 In Transit'],
    in_transit:    ['badge-transit',   '🚚 In Transit'],
    delivered:  ['badge-delivered', '✓ Delivered'],
    cancelled:  ['badge-cancelled', '✕ Cancelled'],
  };
  const [cls, label] = map[status] || ['badge-pending', status];
  return `<span class="badge ${cls}">${label}</span>`;
}

/* ── Build sidebar nav ── */
function buildSidebarNav(summary, pending) {
  const pendingCount  = summary.pending  || 0;
  const ordersCount   = summary.total_orders || 0;
  const reviewCount   = pending.length || 0;

  const farmerNav = `
    <div class="nav-label">Main</div>
    <a href="/pages/dashboard.html"    class="nav-item active"><div class="nav-item-left"><span class="nav-icon">🏠</span> Dashboard</div></a>
    <a href="/pages/my-listings.html"  class="nav-item"><div class="nav-item-left"><span class="nav-icon">🌿</span> My Listings</div></a>
    <a href="/pages/orders.html"       class="nav-item">
      <div class="nav-item-left"><span class="nav-icon">📦</span> Orders</div>
      ${pendingCount > 0 ? `<span class="nav-badge badge-gold">${pendingCount}</span>` : ''}
    </a>
    <a href="/pages/prices.html"       class="nav-item"><div class="nav-item-left"><span class="nav-icon">📊</span> Market Prices</div></a>
    <div class="nav-label">Account</div>
    <a href="/pages/reviews.html"      class="nav-item">
      <div class="nav-item-left"><span class="nav-icon">⭐</span> Reviews</div>
      ${reviewCount > 0 ? `<span class="nav-badge badge-gold">${reviewCount}</span>` : ''}
    </a>
    <a href="/pages/settings.html"     class="nav-item"><div class="nav-item-left"><span class="nav-icon">⚙️</span> Settings</div></a>`;

  const buyerNav = `
    <div class="nav-label">Main</div>
    <a href="/pages/dashboard.html"  class="nav-item active"><div class="nav-item-left"><span class="nav-icon">🏠</span> Dashboard</div></a>
    <a href="/pages/browse.html"     class="nav-item"><div class="nav-item-left"><span class="nav-icon">🛒</span> Browse Produce</div></a>
    <a href="/pages/orders.html"     class="nav-item">
      <div class="nav-item-left"><span class="nav-icon">📦</span> My Orders</div>
      ${ordersCount > 0 ? `<span class="nav-badge badge-gold">${ordersCount}</span>` : ''}
    </a>
    <a href="/pages/prices.html"     class="nav-item"><div class="nav-item-left"><span class="nav-icon">📊</span> Market Prices</div></a>
    <div class="nav-label">Account</div>
    <a href="/pages/reviews.html"    class="nav-item">
      <div class="nav-item-left"><span class="nav-icon">⭐</span> Reviews</div>
      ${reviewCount > 0 ? `<span class="nav-badge badge-gold">${reviewCount}</span>` : ''}
    </a>
    <a href="/pages/settings.html"   class="nav-item"><div class="nav-item-left"><span class="nav-icon">⚙️</span> Settings</div></a>`;

  return isFarmer ? farmerNav : buyerNav;
}

/* ── Build status bars ── */
function buildStatusBar(label, count, total, dotClass, barClass) {
  const pct = total > 0 ? Math.round(count / total * 100) : 0;
  return `<div style="margin-bottom:0.7rem">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.3rem">
      <div style="display:flex;align-items:center;gap:0.5rem;font-size:0.78rem;color:var(--subtext)">
        <div class="activity-dot ${dotClass}"></div>${label}
      </div>
      <span style="font-size:0.75rem;font-weight:600;color:var(--earth)">${count}</span>
    </div>
    <div class="bar-track"><div class="bar-fill ${barClass}" data-w="${pct}%"></div></div>
  </div>`;
}

/* ── Animate bars ── */
function animateBars() {
  document.querySelectorAll('.bar-fill[data-w]').forEach(b => {
    const w = b.getAttribute('data-w');
    b.style.width = '0';
    setTimeout(() => { b.style.width = w; }, 150);
  });
}

/* ── Build order card ── */
function buildOrderCard(o) {
  const party      = isFarmer ? o.buyer_name : (o.farm_name || o.farmer_name);
  const partyLabel = isFarmer ? '← from' : '→ to';
  const actions    = buildOrderActions(o);
  return `<div class="order-card">
    <div>
      <div class="oc-top">
        <span class="oc-id">#${o.id.slice(0,8).toUpperCase()}</span>
        ${statusBadge(o.status)}
        <span class="oc-amount">KSh ${fmtPrice(o.total_amount)}</span>
      </div>
      <div class="oc-meta">
        <span>${partyLabel} <strong style="color:var(--earth)">${party}</strong></span>
        <span class="oc-dot">·</span>
        <span>${fmtDate(o.created_at)}</span>
        ${o.item_count ? `<span class="oc-dot">·</span><span>${o.item_count} item${o.item_count > 1 ? 's' : ''}</span>` : ''}
      </div>
      ${actions ? `<div style="display:flex;gap:0.4rem;flex-wrap:wrap;margin-top:0.6rem">${actions}</div>` : ''}
    </div>
    <a href="/pages/orders.html?id=${o.id}" class="oc-detail-link">Details →</a>
  </div>`;
}

/* ── Build order action buttons ── */
function buildOrderActions(o) {
  const btns = [];
  if (isFarmer) {
    if (o.status === 'pending')   btns.push(`<button class="oa-btn oa-confirm" onclick="doAction('${o.id}','confirm')">✓ Confirm</button>`);
    if (o.status === 'confirmed') btns.push(`<button class="oa-btn oa-ready"   onclick="doAction('${o.id}','ready')">📦 Mark Ready</button>`);
    if (o.status === 'ready')     btns.push(`<button class="oa-btn oa-transit"  onclick="doAction('${o.id}','in-transit')">🚚 Dispatch</button>`);
  } else {
    if (['ready','in_transit','in-transit'].includes(o.status))
      btns.push(`<button class="oa-btn oa-deliver" onclick="doAction('${o.id}','delivered')">✓ Confirm Receipt</button>`);
  }
  if (!['delivered','cancelled'].includes(o.status))
    btns.push(`<button class="oa-btn oa-cancel" onclick="doAction('${o.id}','cancel')">Cancel</button>`);
  return btns.join('');
}

/* ── Order action API call ── */
async function doAction(id, action) {
  const { ok, data } = await apiFetch(`/orders/${id}/${action}`, { method: 'PATCH' });
  if (ok) { toast('Order updated ✅', 'success'); loadDash(); }
  else toast(data.message || 'Failed', 'error');
}

/* ── Review modal ── */
function openReview(orderId, revieweeId, name) {
  pendingReviewOrder = { orderId, revieweeId };
  document.getElementById('reviewFor').textContent = `Reviewing your experience with ${name}`;
  document.getElementById('reviewError').style.display = 'none';
  document.getElementById('reviewComment').value = '';
  pickStar(5);
  document.getElementById('reviewModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeReviewModal() {
  document.getElementById('reviewModal').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('reviewModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeReviewModal();
});

async function submitReview() {
  if (!pendingReviewOrder) return;
  const btn = document.getElementById('reviewSubmitBtn');
  btn.disabled = true; btn.textContent = 'Submitting…';
  const { ok, data } = await apiFetch('/reviews', {
    method: 'POST',
    body: JSON.stringify({
      order_id: pendingReviewOrder.orderId,
      rating:   parseInt(document.getElementById('reviewRating').value),
      comment:  document.getElementById('reviewComment').value.trim()
    })
  });
  if (ok) {
    closeReviewModal();
    toast('Review submitted! ⭐', 'success');
    loadDash();
  } else {
    const el = document.getElementById('reviewError');
    el.textContent = data.message || 'Could not submit review.';
    el.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Submit Review';
  }
}

/* ══════════════════════════════════════════════════════════════════════════
   MAIN LOAD
══════════════════════════════════════════════════════════════════════════ */
async function loadDash() {
  const [summaryRes, ordersRes, pendingRes, meRes, reviewsRecRes, savedRes] = await Promise.all([
    apiFetch('/orders/summary/me'),
    apiFetch('/orders?limit=8'),
    apiFetch('/reviews/pending'),
    apiFetch('/auth/me'),
    apiFetch('/reviews/received?limit=3'),
    isFarmer ? Promise.resolve({ ok: false }) : apiFetch('/listings/saved?limit=4'),
  ]);

  const summary    = summaryRes.ok ? summaryRes.data.data        : {};
  const orders     = ordersRes.ok  ? ordersRes.data.data.orders  : [];
  const pending    = pendingRes.ok ? pendingRes.data.data.pending_reviews : [];
  const me         = meRes.ok      ? meRes.data.data.user        : user;
  const profile    = me.profile || {};
  const revenue    = isFarmer ? (summary.total_revenue || 0) : (summary.total_spent || 0);
  const init       = me.name.charAt(0).toUpperCase();
  const reviewsRec = reviewsRecRes.ok ? (reviewsRecRes.data.data.reviews || []) : [];
  const savedListings = savedRes.ok ? (savedRes.data.data.listings || []) : [];

  /* ── Sidebar nav + footer ── */
  document.getElementById('sidebarNav').innerHTML = buildSidebarNav(summary, pending);
  document.getElementById('sidebarFooter').innerHTML = `
    <div class="sf-avatar">${init}</div>
    <div style="flex:1;min-width:0">
      <div class="sf-name">${me.name}</div>
      <div class="sf-role">${isFarmer ? '🌿 Farmer' : '🛒 Buyer'} · ${me.county || ''}</div>
      ${profile.rating > 0 ? `<div class="sf-rating">${'★'.repeat(Math.round(profile.rating))} ${Number(profile.rating).toFixed(1)}</div>` : ''}
    </div>`;

  /* ── Hero ── */
  document.getElementById('dashHero').innerHTML = `
    <div class="dash-hero">
      <div class="hero-inner">
        <div class="hero-left">
          <div class="hero-greeting">${isFarmer ? '🌾 Farmer Dashboard' : '🛒 Buyer Dashboard'}</div>
          <div class="hero-name">Welcome back,<br>${me.name.split(' ')[0]}.</div>
          <div class="hero-sub">${isFarmer ? (profile.farm_name || '') + ' · ' : ''}${me.county || ''}</div>
          <div class="hero-avatar-wrap">
            <div class="hero-avatar">${init}</div>
            <div class="hero-badge">${me.is_verified ? '✓ Verified' : isFarmer ? '🌱 Farmer' : '🛒 Buyer'}</div>
            ${pending.length > 0 ? `<div class="hero-badge" style="background:rgba(232,160,32,0.18);border-color:rgba(232,160,32,0.35);color:var(--harvest)">⭐ ${pending.length} review${pending.length > 1 ? 's' : ''} pending</div>` : ''}
          </div>
        </div>
        <a href="/pages/settings.html" class="hero-edit-link">Edit profile →</a>
      </div>
      <div class="stats-strip">
        <div class="stat-cell">
          <div class="stat-cell-icon">📦</div>
          <div class="stat-cell-num">${summary.total_orders || 0}</div>
          <div class="stat-cell-label">Total Orders</div>
        </div>
        <div class="stat-cell">
          <div class="stat-cell-icon">✅</div>
          <div class="stat-cell-num">${summary.delivered || 0}</div>
          <div class="stat-cell-label">Completed</div>
        </div>
        <div class="stat-cell">
          <div class="stat-cell-icon">⏳</div>
          <div class="stat-cell-num">${summary.pending || 0}</div>
          <div class="stat-cell-label">Pending</div>
        </div>
        <div class="stat-cell">
          <div class="stat-cell-icon">${isFarmer ? '💰' : '🛍️'}</div>
          <div class="stat-cell-num gold">KSh ${fmtPrice(revenue)}</div>
          <div class="stat-cell-label">${isFarmer ? 'Revenue' : 'Total Spent'}</div>
        </div>
      </div>
    </div>`;

  /* ── Main column ── */
  const mainEl = document.getElementById('dashMain');

  /* helpers for new sections */
  const fmtStar = n => '★'.repeat(n) + '☆'.repeat(5 - n);

  const buildEarningsBreakdown = () => {
    const avg = summary.total_orders > 0
      ? Math.round((summary.total_revenue || 0) / summary.total_orders)
      : 0;
    return `
    <div class="breakdown-card" style="margin-bottom:2rem">
      <div class="sec-head" style="margin-bottom:0"><div class="sec-title">💰 Earnings Breakdown</div></div>
      <div class="breakdown-grid">
        <div class="breakdown-cell">
          <div class="breakdown-cell-label">This Week</div>
          <div class="breakdown-cell-val gold">KSh ${fmtPrice(summary.revenue_week || 0)}</div>
        </div>
        <div class="breakdown-cell">
          <div class="breakdown-cell-label">This Month</div>
          <div class="breakdown-cell-val gold">KSh ${fmtPrice(summary.revenue_month || 0)}</div>
        </div>
        <div class="breakdown-cell">
          <div class="breakdown-cell-label">All Time</div>
          <div class="breakdown-cell-val">KSh ${fmtPrice(summary.total_revenue || 0)}</div>
        </div>
        <div class="breakdown-cell">
          <div class="breakdown-cell-label">Avg Order Value</div>
          <div class="breakdown-cell-val">KSh ${fmtPrice(avg)}</div>
          <div class="breakdown-cell-sub">across ${summary.total_orders || 0} orders</div>
        </div>
      </div>
    </div>`;
  };

  const buildSpendingBreakdown = () => {
    const avg = summary.total_orders > 0
      ? Math.round((summary.total_spent || 0) / summary.total_orders)
      : 0;
    return `
    <div class="breakdown-card" style="margin-bottom:2rem">
      <div class="sec-head" style="margin-bottom:0"><div class="sec-title">💸 Spending Breakdown</div></div>
      <div class="breakdown-grid">
        <div class="breakdown-cell">
          <div class="breakdown-cell-label">This Week</div>
          <div class="breakdown-cell-val gold">KSh ${fmtPrice(summary.spent_week || 0)}</div>
        </div>
        <div class="breakdown-cell">
          <div class="breakdown-cell-label">This Month</div>
          <div class="breakdown-cell-val gold">KSh ${fmtPrice(summary.spent_month || 0)}</div>
        </div>
        <div class="breakdown-cell">
          <div class="breakdown-cell-label">All Time</div>
          <div class="breakdown-cell-val">KSh ${fmtPrice(summary.total_spent || 0)}</div>
        </div>
        <div class="breakdown-cell">
          <div class="breakdown-cell-label">Avg Order Value</div>
          <div class="breakdown-cell-val">KSh ${fmtPrice(avg)}</div>
          ${summary.top_category ? `<div class="breakdown-cell-sub">Top: ${summary.top_category}</div>` : ''}
        </div>
      </div>
    </div>`;
  };

  const buildRatingSection = () => {
    const rating = profile.rating || 0;
    const total  = profile.total_reviews || 0;
    const dist   = profile.rating_distribution || {};
    const totalVotes = [5,4,3,2,1].reduce((s,n) => s + (dist[n] || 0), 0) || 1;
    const starBars = [5,4,3,2,1].map(n => {
      const pct = Math.round((dist[n] || 0) / totalVotes * 100);
      return `<div class="star-bar-row">
        <span class="star-bar-label">${n}★</span>
        <div class="star-bar-track"><div class="star-bar-fill" data-w="${pct}%"></div></div>
        <span class="star-bar-count">${dist[n] || 0}</span>
      </div>`;
    }).join('');
    const recentReviews = reviewsRec.slice(0,3).map(r => `
      <div class="inline-review">
        <div class="ir-header">
          <span class="ir-stars">${fmtStar(r.rating)}</span>
          <span class="ir-name">${r.reviewer_name || 'Anonymous'}</span>
          <span class="ir-date">${fmtDate(r.created_at)}</span>
        </div>
        ${r.comment ? `<div class="ir-comment">${r.comment}</div>` : ''}
      </div>`).join('');
    return `
    <div class="breakdown-card" style="margin-bottom:2rem">
      <div class="sec-head" style="margin-bottom:0"><div class="sec-title">⭐ Rating & Reviews</div>
        <a href="/pages/reviews.html" class="sec-link">View all →</a>
      </div>
      ${total === 0 ? `<p style="font-size:0.83rem;color:var(--subtext);margin-top:1rem">No reviews yet. Complete orders to start earning ratings.</p>` : `
      <div class="rating-hero">
        <div>
          <div class="rating-big">${Number(rating).toFixed(1)}</div>
          <div class="rating-stars-lg">${fmtStar(Math.round(rating))}</div>
          <div class="rating-count">${total} review${total !== 1 ? 's' : ''}</div>
        </div>
        <div style="flex:1">${starBars}</div>
      </div>
      ${recentReviews ? `<div>${recentReviews}</div>` : ''}`}
    </div>`;
  };

  const buildSavedListings = () => {
    if (savedListings.length === 0) return `
    <div class="breakdown-card" style="margin-bottom:2rem">
      <div class="sec-head" style="margin-bottom:0"><div class="sec-title">🔖 Saved Listings</div>
        <a href="/pages/browse.html" class="sec-link">Browse →</a>
      </div>
      <p style="font-size:0.83rem;color:var(--subtext);margin-top:1rem">No saved listings yet. Browse produce and save items you like.</p>
    </div>`;
    const cards = savedListings.map(l => `
      <div class="listing-mini">
        <div class="listing-mini-name">${l.produce_name || l.title || 'Listing'}</div>
        <div class="listing-mini-farm">${l.farm_name || ''}</div>
        <div class="listing-mini-price">KSh ${fmtPrice(l.price_per_unit || 0)} / ${l.unit || 'kg'}</div>
        <a href="/pages/browse.html?listing=${l.id}" class="listing-mini-reorder">🛒 Order again</a>
      </div>`).join('');
    return `
    <div class="breakdown-card" style="margin-bottom:2rem">
      <div class="sec-head" style="margin-bottom:0"><div class="sec-title">🔖 Saved & Recent Listings</div>
        <a href="/pages/browse.html" class="sec-link">Browse all →</a>
      </div>
      <div class="listing-grid">${cards}</div>
    </div>`;
  };

  mainEl.innerHTML = `

    ${!me.subscription_active ? `
    <div class="alert-banner" id="alertBanner">
      <div class="alert-icon">ℹ</div>
      <div>You don't have an active subscription. ${isFarmer ? `You can only list basic produce and will be charged <strong>${me.commission_rate || 15}%</strong> on completed orders.` : 'Upgrade for priority access to new listings.'} <a href="/pages/settings.html#subscription" class="alert-link">Click here to subscribe.</a></div>
      <button class="alert-close" onclick="document.getElementById('alertBanner').style.display='none'">✕</button>
    </div>` : ''}

    ${pending.length > 0 ? `
    <div style="margin-bottom:2rem">
      <div class="sec-head"><div class="sec-title">⭐ Reviews to Write</div></div>
      ${pending.map(p => `
        <div class="review-card">
          <div class="rc-icon">👤</div>
          <div style="flex:1;min-width:0">
            <div class="rc-name">${p.reviewee_name}</div>
            <div class="rc-sub">${p.items_summary || 'Order #' + p.order_id.slice(0,8).toUpperCase()}</div>
          </div>
          <button class="qbtn qbtn-soft" style="padding:0.45rem 1rem;font-size:0.78rem;border-radius:8px"
            onclick="openReview('${p.order_id}','${p.reviewee_id}','${p.reviewee_name}')">Write Review →</button>
        </div>`).join('')}
    </div>` : ''}

    <div class="quick-row">
      ${isFarmer
        ? `<a href="/pages/my-listings.html" class="qbtn qbtn-primary">＋ Post Listing</a>
           <a href="/pages/orders.html"      class="qbtn qbtn-soft">📦 All Orders</a>
           <a href="/pages/prices.html"      class="qbtn qbtn-soft">📊 Market Prices</a>
           <a href="/pages/my-listings.html" class="qbtn qbtn-soft">🌿 My Listings</a>`
        : `<a href="/pages/browse.html"      class="qbtn qbtn-primary">🛒 Browse Produce</a>
           <a href="/pages/orders.html"      class="qbtn qbtn-soft">📦 My Orders</a>
           <a href="/pages/prices.html"      class="qbtn qbtn-soft">📊 Market Prices</a>`}
    </div>

    ${isFarmer ? buildEarningsBreakdown() : buildSpendingBreakdown()}
    ${isFarmer ? buildRatingSection()     : buildSavedListings()}

    <div>
      <div class="sec-head">
        <div class="sec-title">Recent Orders</div>
        <a href="/pages/orders.html" class="sec-link">View all →</a>
      </div>
      ${orders.length === 0
        ? `<div class="empty-state">
             <div class="icon">${isFarmer ? '🌾' : '🛒'}</div>
             <h3>No orders yet</h3>
             <p>${isFarmer ? "When buyers place orders, they'll appear here." : 'Browse listings and place your first order.'}</p>
             <a href="${isFarmer ? '/pages/my-listings.html' : '/pages/browse.html'}" class="btn btn-primary btn-sm" style="margin-top:1.25rem">${isFarmer ? 'Post a Listing' : 'Browse Produce'}</a>
           </div>`
        : orders.map(o => buildOrderCard(o)).join('')}
    </div>`;

  /* ── Sidebar ── */
  const sideEl = document.getElementById('dashSidebar');
  sideEl.innerHTML = `
    <div class="sidebar-card">
      <div class="sidebar-card-title">My Profile</div>
      <div class="farm-profile">
        <div class="fp-avatar">${init}</div>
        <div class="fp-name">${me.name}</div>
        <div class="fp-role">${isFarmer ? (profile.farm_name || '🌿 Farmer') : (profile.business_name || '🛒 Buyer')} · ${me.county || ''}</div>
        ${profile.rating > 0 ? `
        <div class="fp-rating">
          <span class="fp-rating-stars">${'★'.repeat(Math.round(profile.rating))}${'☆'.repeat(5 - Math.round(profile.rating))}</span>
          <span>${Number(profile.rating).toFixed(1)} (${profile.total_reviews || 0} reviews)</span>
        </div>` : ''}
        <div class="fp-stats">
          ${isFarmer
            ? `<div class="fp-stat"><div class="fp-stat-num">${profile.total_sales || 0}</div><div class="fp-stat-label">Total Sales</div></div>
               <div class="fp-stat"><div class="fp-stat-num">${summary.total_orders || 0}</div><div class="fp-stat-label">Orders</div></div>`
            : `<div class="fp-stat"><div class="fp-stat-num">${summary.total_orders || 0}</div><div class="fp-stat-label">Orders</div></div>
               <div class="fp-stat"><div class="fp-stat-num">${summary.delivered || 0}</div><div class="fp-stat-label">Completed</div></div>`}
        </div>
        <a href="/pages/settings.html" class="fp-edit-btn">Edit Profile →</a>
      </div>
    </div>

    <div class="sidebar-card">
      <div class="sidebar-card-title">Quick Links</div>
      <div class="sidebar-links">
        ${isFarmer ? `
        <a href="/pages/my-listings.html" class="sidebar-link"><div class="sidebar-link-icon" style="background:#e8f4e8">🌿</div> My Listings</a>
        <a href="/pages/orders.html"      class="sidebar-link"><div class="sidebar-link-icon" style="background:#eff6ff">📦</div> Incoming Orders</a>
        <a href="/pages/prices.html"      class="sidebar-link"><div class="sidebar-link-icon" style="background:#fffbeb">📊</div> Market Prices</a>
        <a href="/pages/settings.html"    class="sidebar-link"><div class="sidebar-link-icon" style="background:var(--mist)">⚙️</div> Account Settings</a>
        ` : `
        <a href="/pages/browse.html"      class="sidebar-link"><div class="sidebar-link-icon" style="background:#e8f4e8">🛒</div> Browse Produce</a>
        <a href="/pages/orders.html"      class="sidebar-link"><div class="sidebar-link-icon" style="background:#eff6ff">📦</div> My Orders</a>
        <a href="/pages/prices.html"      class="sidebar-link"><div class="sidebar-link-icon" style="background:#fffbeb">📊</div> Market Prices</a>
        <a href="/pages/settings.html"    class="sidebar-link"><div class="sidebar-link-icon" style="background:var(--mist)">⚙️</div> Account Settings</a>
        `}
      </div>
    </div>

    ${(summary.total_orders || 0) > 0 ? `
    <div class="sidebar-card">
      <div class="sidebar-card-title">Order Breakdown</div>
      ${buildStatusBar('Pending',   summary.pending   || 0, summary.total_orders, 'dot-pending',   'bar-gold')}
      ${buildStatusBar('Confirmed', summary.confirmed || 0, summary.total_orders, 'dot-confirmed', 'bar-blue')}
      ${buildStatusBar('Delivered', summary.delivered || 0, summary.total_orders, 'dot-delivered', 'bar-green')}
      ${buildStatusBar('Cancelled', summary.cancelled || 0, summary.total_orders, 'dot-cancelled', 'bar-red')}
    </div>` : ''}`;

  /* animate progress bars + star bars after render */
  requestAnimationFrame(() => setTimeout(animateBars, 50));
}

loadDash();
</script>
</body>
</html>
