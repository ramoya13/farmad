<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard — FarmAd</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared.css">
<style>
/* ── Reset & Variables ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:       #1c2e0e;
  --navy-light: #243810;
  --navy-hover: #2e4614;
  --leaf:       #3a7d2c;
  --leaf-dim:   #2d6122;
  --red:        #c0392b;
  --gold:       #e8a020;
  --harvest:    #e8a020;
  --earth:      #1c2e0e;
  --white:      #ffffff;
  --bg:         #f2ede4;
  --cream:      #f2ede4;
  --mist:       #ebe5d8;
  --card:       #ffffff;
  --border:     rgba(45,27,14,0.10);
  --text:       #1c2e0e;
  --subtext:    #7a6e5a;
  --sidebar-w:  240px;
  --topbar-h:   60px;
  --radius:     14px;
  --radius-lg:  18px;
}

body {
  font-family: 'Sora', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Skeleton loader ───────────────────────────────────────────── */
.skeleton {
  background: linear-gradient(90deg, var(--mist) 25%, #e8e0d0 50%, var(--mist) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 10px;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ── Top Bar ───────────────────────────────────────────────────── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--topbar-h);
  background: var(--white);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 1.5rem 0 calc(var(--sidebar-w) + 1.5rem);
  z-index: 100;
}
.topbar-left { display: flex; align-items: center; gap: 0.75rem; }
.topbar-hamburger { font-size: 1.2rem; cursor: pointer; color: var(--subtext); background: none; border: none; line-height: 1; }
.topbar-wallet {
  display: flex; align-items: center; gap: 0.4rem;
  background: var(--leaf); color: white;
  font-size: 0.75rem; font-weight: 700;
  padding: 0.3rem 0.85rem; border-radius: 100px;
  letter-spacing: 0.3px; cursor: pointer;
}
.topbar-right { display: flex; align-items: center; gap: 1.1rem; }
.topbar-icon { font-size: 1.1rem; color: var(--subtext); cursor: pointer; position: relative; }
.topbar-profile { display: flex; align-items: center; gap: 0.55rem; cursor: pointer; }
.topbar-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--leaf); color: white;
  font-size: 0.82rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}
.topbar-name { font-size: 0.85rem; font-weight: 600; color: var(--text); }
.topbar-caret { font-size: 0.65rem; color: var(--subtext); }
.topbar-pill {
  font-size: 0.7rem; font-weight: 700;
  padding: 0.2rem 0.6rem; border-radius: 6px;
  background: #e8f4e8; color: var(--leaf);
  border: 1px solid rgba(58,125,44,0.25);
}

/* ── Sidebar ───────────────────────────────────────────────────── */
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: var(--sidebar-w);
  background: var(--navy);
  display: flex; flex-direction: column;
  z-index: 200; overflow-y: auto;
}
.sidebar-logo {
  height: var(--topbar-h);
  display: flex; align-items: center;
  padding: 0 1.5rem;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0; text-decoration: none;
}
.logo-text { font-size: 1.15rem; font-weight: 800; color: white; letter-spacing: -0.3px; }
.logo-text span { color: var(--gold); }
.logo-icon { font-size: 1.3rem; margin-right: 0.5rem; }
.sidebar-nav { flex: 1; padding: 1.25rem 0.75rem; display: flex; flex-direction: column; gap: 0.15rem; }
.nav-label {
  font-size: 0.6rem; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: rgba(255,255,255,0.25);
  padding: 0.75rem 0.75rem 0.4rem; margin-top: 0.5rem;
}
.nav-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.6rem 0.75rem; border-radius: 10px;
  cursor: pointer; text-decoration: none;
  color: rgba(255,255,255,0.5);
  font-size: 0.86rem; font-weight: 500;
  transition: all 0.15s; position: relative;
}
.nav-item:hover { background: var(--navy-hover); color: rgba(255,255,255,0.85); }
.nav-item.active { background: var(--navy-light); color: white; font-weight: 600; }
.nav-item.active::before {
  content: ''; position: absolute;
  left: -0.75rem; top: 20%; bottom: 20%;
  width: 3px; border-radius: 0 3px 3px 0; background: var(--gold);
}
.nav-item-left { display: flex; align-items: center; gap: 0.65rem; }
.nav-icon { font-size: 1rem; width: 20px; text-align: center; }
.nav-badge {
  min-width: 20px; height: 20px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem; font-weight: 700; padding: 0 5px;
}
.badge-green { background: var(--leaf); color: white; }
.badge-gold  { background: var(--gold); color: white; }
.badge-red   { background: var(--red);  color: white; }
.sidebar-footer {
  padding: 1rem 1.25rem;
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex; align-items: center; gap: 0.6rem;
}
.sf-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--leaf); color: white;
  font-size: 0.82rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.sf-info { flex: 1; min-width: 0; }
.sf-name { font-size: 0.8rem; font-weight: 600; color: rgba(255,255,255,0.85); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sf-role { font-size: 0.65rem; color: rgba(255,255,255,0.3); }
.sf-rating { font-size: 0.7rem; color: var(--gold); font-weight: 700; flex-shrink: 0; }
.sf-logout { background: none; border: none; color: rgba(255,255,255,0.25); font-size: 1rem; cursor: pointer; flex-shrink: 0; transition: color 0.15s; }
.sf-logout:hover { color: var(--red); }
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

/* ── Main Content ──────────────────────────────────────────────── */
.main {
  margin-left: var(--sidebar-w);
  margin-top: var(--topbar-h);
  padding: 1.75rem 2rem 3rem;
  min-height: calc(100vh - var(--topbar-h));
}

/* ── Alert Banner ──────────────────────────────────────────────── */
.alert-banner {
  background: #fffbeb; border: 1px solid rgba(232,160,32,0.3);
  border-radius: var(--radius); padding: 0.85rem 1.1rem;
  display: flex; align-items: flex-start; gap: 0.75rem;
  margin-bottom: 1.75rem; font-size: 0.82rem; color: #7a5800;
}
.alert-icon {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--gold); color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem; flex-shrink: 0; font-weight: 700;
}
.alert-close { margin-left: auto; background: none; border: none; color: var(--subtext); cursor: pointer; font-size: 1rem; line-height: 1; padding: 0; }
.alert-link { color: var(--leaf); font-weight: 600; text-decoration: none; }
.alert-link:hover { text-decoration: underline; }

/* ── Page Header ───────────────────────────────────────────────── */
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
.page-title-wrap { display: flex; align-items: center; gap: 0.75rem; }
.page-title-icon { font-size: 1.5rem; }
.page-title { font-size: 1.5rem; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
.page-subtitle { font-size: 0.78rem; color: var(--subtext); margin-top: 0.15rem; }

/* ── Stats Grid ────────────────────────────────────────────────── */
.stats-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 1rem; margin-bottom: 1.5rem;
}
.stat-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.25rem 1.4rem;
  display: flex; flex-direction: column; gap: 0.5rem;
}
.stat-card-icon {
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; background: var(--mist); margin-bottom: 0.25rem;
}
.stat-num { font-size: 2rem; font-weight: 800; line-height: 1; letter-spacing: -1px; }
.stat-num.green { color: var(--leaf); }
.stat-num.red   { color: var(--red); }
.stat-num.gold  { color: var(--gold); }
.stat-label { font-size: 0.75rem; color: var(--subtext); font-weight: 500; }

/* ── Quick Actions ─────────────────────────────────────────────── */
.quick-actions { display: flex; gap: 0.65rem; flex-wrap: wrap; margin-bottom: 1.75rem; }
.qbtn {
  display: inline-flex; align-items: center; gap: 0.45rem;
  padding: 0.6rem 1.1rem; border-radius: 100px;
  font-family: 'Sora', sans-serif; font-size: 0.82rem; font-weight: 600;
  cursor: pointer; border: none; text-decoration: none;
  transition: all 0.15s; white-space: nowrap;
}
.qbtn-primary { background: var(--leaf); color: white; box-shadow: 0 4px 12px rgba(58,125,44,0.25); }
.qbtn-primary:hover { background: var(--leaf-dim); transform: translateY(-1px); }
.qbtn-soft { background: white; color: var(--text); border: 1.5px solid var(--border); }
.qbtn-soft:hover { border-color: var(--leaf); color: var(--leaf); }

/* ── Section Header ────────────────────────────────────────────── */
.sec-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.9rem; }
.sec-title { font-size: 1rem; font-weight: 700; color: var(--text); }
.sec-link { font-size: 0.78rem; color: var(--leaf); font-weight: 600; text-decoration: none; }
.sec-link:hover { text-decoration: underline; }

/* ── Review Cards ──────────────────────────────────────────────── */
.review-card {
  background: linear-gradient(135deg, #fffbf0 0%, #fff8e6 100%);
  border: 1px solid rgba(232,160,32,0.2); border-radius: var(--radius);
  padding: 1rem 1.25rem; margin-bottom: 0.65rem;
  display: flex; align-items: center; justify-content: space-between; gap: 1rem;
}
.rc-name { font-weight: 700; color: var(--text); font-size: 0.88rem; }
.rc-sub  { font-size: 0.73rem; color: var(--subtext); margin-top: 0.1rem; }
.rc-icon { font-size: 1.4rem; flex-shrink: 0; }

/* ── Order Cards ───────────────────────────────────────────────── */
.order-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 0.65rem;
  display: grid; grid-template-columns: 1fr auto;
  gap: 0.75rem; align-items: center;
  transition: box-shadow 0.2s, transform 0.2s;
}
.order-card:hover { box-shadow: 0 4px 18px rgba(28,46,14,0.08); transform: translateY(-1px); }
.oc-top { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.3rem; }
.oc-id {
  font-size: 0.65rem; font-family: monospace;
  background: var(--mist); color: var(--subtext);
  padding: 0.15rem 0.45rem; border-radius: 5px;
}
.oc-amount { font-weight: 700; color: var(--text); font-size: 0.92rem; }
.oc-meta { font-size: 0.73rem; color: var(--subtext); display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; }
.oc-dot { opacity: 0.35; }
.oc-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.6rem; }
.oa-btn { padding: 0.3rem 0.75rem; border-radius: 7px; border: none; font-family: 'Sora', sans-serif; font-size: 0.7rem; font-weight: 700; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.oa-confirm { background: var(--leaf); color: white; }
.oa-confirm:hover { background: var(--leaf-dim); }
.oa-ready   { background: #e8f4e8; color: #1a5c0f; }
.oa-ready:hover   { background: #d0ebd0; }
.oa-transit { background: #fff7e6; color: #8a5c00; }
.oa-transit:hover { background: #fdecc8; }
.oa-deliver { background: #dcfce7; color: #166534; }
.oa-deliver:hover { background: #bbf7d0; }
.oa-cancel  { background: #fee2e2; color: #991b1b; }
.oa-cancel:hover  { background: #fecaca; }
.oc-right { display: flex; flex-direction: column; align-items: flex-end; gap: 0.4rem; }
.oc-detail-link { font-size: 0.73rem; color: var(--leaf); font-weight: 600; text-decoration: none; white-space: nowrap; }
.oc-detail-link:hover { text-decoration: underline; }

/* ── Status Badges ─────────────────────────────────────────────── */
.status-badge {
  display: inline-flex; align-items: center; gap: 0.3rem;
  font-size: 0.65rem; font-weight: 700; letter-spacing: 0.3px;
  padding: 0.2rem 0.6rem; border-radius: 100px;
}
.status-pending    { background: #fff7e6; color: #b45309; border: 1px solid rgba(232,160,32,0.25); }
.status-confirmed  { background: #e8f4e8; color: #166534; border: 1px solid rgba(58,125,44,0.2); }
.status-ready      { background: #eff6ff; color: #1d4ed8; border: 1px solid rgba(59,130,246,0.2); }
.status-in_transit,
.status-in-transit { background: #fff7e6; color: #92400e; border: 1px solid rgba(232,160,32,0.25); }
.status-delivered  { background: #f0fdf4; color: #15803d; border: 1px solid rgba(34,197,94,0.2); }
.status-cancelled  { background: #fef2f2; color: #991b1b; border: 1px solid rgba(239,68,68,0.15); }

/* ── Content Layout ────────────────────────────────────────────── */
.content-wrap { display: grid; grid-template-columns: 1fr 300px; gap: 1.5rem; align-items: start; }
@media (max-width: 1100px) { .content-wrap { grid-template-columns: 1fr; } .sidebar-panel { display: none; } }

/* ── Right Panel ───────────────────────────────────────────────── */
.panel-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 1.4rem; margin-bottom: 1rem;
}
.panel-title {
  font-size: 0.62rem; font-weight: 700; letter-spacing: 1.8px;
  text-transform: uppercase; color: var(--subtext); margin-bottom: 1.1rem;
}
.profile-center { text-align: center; }
.profile-avatar {
  width: 58px; height: 58px; border-radius: 50%;
  background: linear-gradient(135deg, var(--leaf), var(--navy));
  color: white; font-size: 1.5rem; font-weight: 800;
  display: flex; align-items: center; justify-content: center; margin: 0 auto 0.75rem;
}
.profile-name { font-size: 1rem; font-weight: 700; color: var(--text); }
.profile-role { font-size: 0.73rem; color: var(--subtext); margin-top: 0.2rem; }
.profile-rating { font-size: 0.82rem; color: var(--gold); margin-top: 0.4rem; letter-spacing: 1px; }
.profile-rating-sub { font-size: 0.7rem; color: var(--subtext); }
.profile-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 0.65rem; margin: 1.1rem 0; }
.ps-cell { background: var(--mist); border-radius: 10px; padding: 0.7rem; text-align: center; }
.ps-num   { font-size: 1.25rem; font-weight: 800; color: var(--text); }
.ps-label { font-size: 0.62rem; color: var(--subtext); margin-top: 0.15rem; }
.edit-btn {
  display: block; width: 100%; padding: 0.6rem;
  background: var(--mist); border: none; border-radius: 10px;
  font-family: 'Sora', sans-serif; font-size: 0.8rem; font-weight: 600;
  color: var(--text); cursor: pointer; text-align: center; text-decoration: none;
  transition: background 0.15s;
}
.edit-btn:hover { background: #ddd6c8; }
.sidelinks { display: flex; flex-direction: column; gap: 0.25rem; }
.sidelink {
  display: flex; align-items: center; gap: 0.7rem;
  padding: 0.6rem 0.75rem; border-radius: 10px;
  text-decoration: none; color: var(--subtext); font-size: 0.84rem; font-weight: 500; transition: all 0.15s;
}
.sidelink:hover { background: var(--mist); color: var(--text); }
.sidelink-icon { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; flex-shrink: 0; }
.breakdown-item { margin-bottom: 0.75rem; }
.breakdown-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.3rem; }
.breakdown-label { display: flex; align-items: center; gap: 0.45rem; font-size: 0.76rem; color: var(--subtext); }
.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dot-pending   { background: var(--gold); }
.dot-confirmed { background: var(--leaf); }
.dot-delivered { background: #22c55e; }
.dot-cancelled { background: var(--red); }
.breakdown-count { font-size: 0.73rem; font-weight: 700; color: var(--text); }
.bar-track { background: var(--mist); border-radius: 100px; height: 5px; overflow: hidden; }
.bar-fill  { height: 100%; border-radius: 100px; transition: width 0.6s ease; }

/* ── Empty State ───────────────────────────────────────────────── */
.empty-state {
  text-align: center; padding: 3rem 1rem;
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
}
.empty-state .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
.empty-state h3 { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 0.4rem; }
.empty-state p  { font-size: 0.82rem; color: var(--subtext); }
.btn-primary-sm {
  display: inline-flex; align-items: center;
  padding: 0.55rem 1.1rem; border-radius: 100px;
  background: var(--leaf); color: white;
  font-family: 'Sora', sans-serif; font-size: 0.82rem; font-weight: 600;
  text-decoration: none; margin-top: 1.25rem; transition: background 0.15s;
}
.btn-primary-sm:hover { background: var(--leaf-dim); }

/* ── Toast ─────────────────────────────────────────────────────── */
.toast-wrap { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
.toast {
  padding: 0.75rem 1.1rem; border-radius: 12px;
  font-size: 0.84rem; font-weight: 600; color: white;
  animation: toastIn 0.25s ease;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}
.toast-success { background: var(--leaf); }
.toast-error   { background: var(--red); }
@keyframes toastIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

/* ── Review Modal ──────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(2px);
  display: none; align-items: center; justify-content: center; padding: 1rem;
}
.modal-overlay.open { display: flex; }
.modal {
  background: white; border-radius: var(--radius-lg);
  padding: 2rem; width: 100%; max-width: 440px;
  position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.modal-close {
  position: absolute; top: 1rem; right: 1rem;
  background: var(--mist); border: none; border-radius: 8px;
  width: 28px; height: 28px; font-size: 0.9rem; cursor: pointer; color: var(--subtext);
  display: flex; align-items: center; justify-content: center; transition: background 0.15s;
}
.modal-close:hover { background: #ddd6c8; }
.modal h3 { font-size: 1.15rem; font-weight: 800; color: var(--text); margin-bottom: 0.25rem; }
.modal p  { font-size: 0.83rem; color: var(--subtext); margin-bottom: 1.5rem; }
.form-group { margin-bottom: 1rem; }
.form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text); margin-bottom: 0.4rem; }
.form-group textarea {
  width: 100%; border: 1.5px solid var(--border); border-radius: 12px;
  padding: 0.7rem 1rem; font-family: 'Sora', sans-serif; font-size: 0.88rem;
  outline: none; resize: vertical; transition: border-color 0.2s; color: var(--text); background: white;
}
.form-group textarea:focus { border-color: var(--leaf); }
.submit-btn {
  width: 100%; padding: 0.75rem;
  background: var(--leaf); color: white; border: none; border-radius: 12px;
  font-family: 'Sora', sans-serif; font-size: 0.9rem; font-weight: 700;
  cursor: pointer; transition: background 0.15s;
}
.submit-btn:hover:not(:disabled) { background: var(--leaf-dim); }
.submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.alert-error {
  background: #fee2e2; color: #991b1b; border-radius: 8px;
  padding: 0.6rem 0.85rem; font-size: 0.8rem; margin-bottom: 0.75rem; display: none;
}

/* ── Responsive ────────────────────────────────────────────────── */
@media (max-width: 900px) {
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); transition: transform 0.25s; }
  .sidebar.open { transform: translateX(0); }
  .topbar { padding-left: 1.5rem; }
  .main { margin-left: 0; padding: 1.25rem 1rem 3rem; }
}
@media (max-width: 520px) {
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .topbar-name { display: none; }
}
</style>
</head>
<body>

<!-- ── Sidebar ── -->
<aside class="sidebar" id="sidebar">
  <a href="/" class="sidebar-logo">
    <span class="logo-icon">🌿</span>
    <span class="logo-text">Farm<span>Ad</span></span>
  </a>
  <nav class="sidebar-nav" id="sideNav">
    <div style="padding:1rem 0.75rem">
      <div class="skeleton" style="height:36px;margin-bottom:0.5rem"></div>

<script>
/* ─────────────────────────────────────────────────────
   Helpers
───────────────────────────────────────────────────── */
function fmtPrice(n) {
  return Number(n||0).toLocaleString('en-KE',{minimumFractionDigits:0,maximumFractionDigits:0});
}
function fmtDate(d) {
  if (!d) return '';
  const diff = Math.floor((Date.now() - new Date(d)) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Yesterday';
  if (diff < 7)  return diff + ' days ago';
  if (diff < 30) return Math.floor(diff/7) + ' wk ago';
  return new Date(d).toLocaleDateString('en-KE',{day:'numeric',month:'short'});
}
function statusBadge(s) {
  const map = {
    pending:      ['⏳','Pending',    'status-pending'],
    confirmed:    ['✓', 'Confirmed',  'status-confirmed'],
    ready:        ['📦','Ready',      'status-ready'],
    in_transit:   ['🚚','In Transit', 'status-in_transit'],
    'in-transit': ['🚚','In Transit', 'status-in_transit'],
    delivered:    ['✅','Delivered',  'status-delivered'],
    cancelled:    ['✕', 'Cancelled',  'status-cancelled'],
  };
  const [icon,label,cls] = map[s] || ['·',s,'status-pending'];
  return `<span class="status-badge ${cls}">${icon} ${label}</span>`;
}

/* Toast — use shared if available, else local fallback */
function showToast(msg, type='success') {
  if (typeof toast === 'function') { toast(msg, type); return; }
  const wrap = document.getElementById('toastWrap');
  const el   = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(()=>el.remove(), 3200);
}

/* ─────────────────────────────────────────────────────
   Auth
───────────────────────────────────────────────────── */
const user     = requireAuth();
if (!user) throw new Error('redirect');
const isFarmer = user.role === 'farmer';

/* ─────────────────────────────────────────────────────

───────────────────────────────────────────────────── */

      ? `<a href="/pages/my-listings.html" class="nav-item">

    </a>

      <div class="nav-item-left"><span class="nav-icon">⏳</span> Pending</div>
      ${(summary.pending||0)>0 ? `<span class="nav-badge badge-gold">${summary.pending}</span>` : ''}
    </a>

/* ─────────────────────────────────────────────────────

───────────────────────────────────────────────────── */
function buildTopbar(me) {
  document.getElementById('topAvatar').textContent = me.name.charAt(0).toUpperCase();
  document.getElementById('topName').textContent   = me.name.split(' ')[0];

/* ─────────────────────────────────────────────────────
   Stats cards
───────────────────────────────────────────────────── */
function buildStats(summary) {
  const revenue = isFarmer ? summary.total_revenue : summary.total_spent;
  return `
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-card-icon">📦</div>
      <div class="stat-num green">${summary.total_orders||0}</div>
      <div class="stat-label">Total Orders</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-icon">✅</div>
      <div class="stat-num green">${summary.delivered||0}</div>
      <div class="stat-label">Completed</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-icon">⏳</div>
      <div class="stat-num red">${summary.pending||0}</div>

    </div>
  </div>`;
}

/* ─────────────────────────────────────────────────────
   Order card + actions
───────────────────────────────────────────────────── */
function buildOrderCard(o) {
  const party      = isFarmer ? o.buyer_name : (o.farm_name || o.farmer_name);
  const partyLabel = isFarmer ? '← from' : '→ to';
  const actions    = buildOrderActions(o);
  return `
  <div class="order-card">
    <div>
      <div class="oc-top">
        <span class="oc-id">#${o.id.slice(0,8).toUpperCase()}</span>
        ${statusBadge(o.status)}
        <span class="oc-amount">KSh ${fmtPrice(o.total_amount)}</span>
      </div>
      <div class="oc-meta">
        <span>${partyLabel} <strong style="color:var(--text)">${party||'—'}</strong></span>
        <span class="oc-dot">·</span>
        <span>${fmtDate(o.created_at)}</span>
        ${o.item_count ? `<span class="oc-dot">·</span><span>${o.item_count} item${o.item_count>1?'s':''}</span>` : ''}
      </div>
      ${actions ? `<div class="oc-actions">${actions}</div>` : ''}
    </div>
    <div class="oc-right">
      <a href="/pages/orders.html?id=${o.id}" class="oc-detail-link">Details →</a>
    </div>
  </div>`;
}

function buildOrderActions(o) {
  const btns = [];
  if (isFarmer) {
    if (o.status==='pending')   btns.push(`<button class="oa-btn oa-confirm" onclick="doAction('${o.id}','confirm')">✓ Confirm</button>`);
    if (o.status==='confirmed') btns.push(`<button class="oa-btn oa-ready"   onclick="doAction('${o.id}','ready')">📦 Mark Ready</button>`);
    if (o.status==='ready')     btns.push(`<button class="oa-btn oa-transit"  onclick="doAction('${o.id}','in-transit')">🚚 Dispatch</button>`);
  } else {
    if (['ready','in_transit','in-transit'].includes(o.status))
      btns.push(`<button class="oa-btn oa-deliver" onclick="doAction('${o.id}','delivered')">✓ Confirm Receipt</button>`);
  }
  if (!['delivered','cancelled'].includes(o.status))
    btns.push(`<button class="oa-btn oa-cancel" onclick="doAction('${o.id}','cancel')">Cancel</button>`);
  return btns.join('');
}

async function doAction(id, action) {
  const { ok, data } = await apiFetch(`/orders/${id}/${action}`, { method:'PATCH' });
  if (ok) { showToast('Order updated ✅','success'); loadDash(); }
  else showToast((data&&data.message)||'Action failed','error');
}

/* ─────────────────────────────────────────────────────
   Right panel
───────────────────────────────────────────────────── */

  const profile  = me.profile || {};
  const rating   = profile.rating || 0;

    const pct = total > 0 ? Math.round((count/total)*100) : 0;
    return `<div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>`;
  }
  return `
  <div class="panel-card">
    <div class="panel-title">My Profile</div>
    <div class="profile-center">
      <div class="profile-avatar">${me.name.charAt(0).toUpperCase()}</div>
      <div class="profile-name">${me.name}</div>
      <div class="profile-role">${isFarmer?(profile.farm_name||'Farmer'):(profile.business_name||'Buyer')}${me.county?' · '+me.county:''}</div>
      ${rating>0 ? `

      <div class="profile-rating-sub">${Number(rating).toFixed(1)} / 5 &nbsp;(${profile.total_reviews||0} reviews)</div>` : ''}
      <div class="profile-stats">
        ${isFarmer
          ? `<div class="ps-cell"><div class="ps-num">${profile.total_sales||0}</div><div class="ps-label">Sales</div></div>
             <div class="ps-cell"><div class="ps-num">${summary.total_orders||0}</div><div class="ps-label">Orders</div></div>`
          : `<div class="ps-cell"><div class="ps-num">${summary.total_orders||0}</div><div class="ps-label">Orders</div></div>
             <div class="ps-cell"><div class="ps-num">${summary.delivered||0}</div><div class="ps-label">Completed</div></div>`}
      </div>
      <a href="/pages/settings.html" class="edit-btn">Edit Profile →</a>
    </div>
  </div>

  <div class="panel-card">
    <div class="panel-title">Quick Links</div>
    <div class="sidelinks">
      ${isFarmer ? `
      <a href="/pages/my-listings.html" class="sidelink"><div class="sidelink-icon" style="background:#e8f4e8">🌿</div> My Listings</a>
      <a href="/pages/orders.html"      class="sidelink"><div class="sidelink-icon" style="background:#fffbeb">📦</div> Incoming Orders</a>
      <a href="/pages/prices.html"      class="sidelink"><div class="sidelink-icon" style="background:#f0fdf4">📊</div> Market Prices</a>
      <a href="/pages/settings.html"    class="sidelink"><div class="sidelink-icon" style="background:var(--mist)">⚙️</div> Account Settings</a>
      ` : `
      <a href="/pages/browse.html"      class="sidelink"><div class="sidelink-icon" style="background:#e8f4e8">🛒</div> Browse Produce</a>
      <a href="/pages/orders.html"      class="sidelink"><div class="sidelink-icon" style="background:#fffbeb">📦</div> My Orders</a>
      <a href="/pages/prices.html"      class="sidelink"><div class="sidelink-icon" style="background:#f0fdf4">📊</div> Market Prices</a>
      <a href="/pages/settings.html"    class="sidelink"><div class="sidelink-icon" style="background:var(--mist)">⚙️</div> Account Settings</a>
      `}
    </div>
  </div>

  ${total > 0 ? `
  <div class="panel-card">
    <div class="panel-title">Order Breakdown</div>
    <div class="breakdown-item">
      <div class="breakdown-head">
        <div class="breakdown-label"><span class="dot dot-pending"></span> Pending</div>
        <span class="breakdown-count">${summary.pending||0}</span>
      </div>${bar(summary.pending||0,'var(--gold)')}
    </div>
    <div class="breakdown-item">
      <div class="breakdown-head">
        <div class="breakdown-label"><span class="dot dot-confirmed"></span> Confirmed</div>
        <span class="breakdown-count">${summary.confirmed||0}</span>
      </div>${bar(summary.confirmed||0,'var(--leaf)')}
    </div>
    <div class="breakdown-item">
      <div class="breakdown-head">
        <div class="breakdown-label"><span class="dot dot-delivered"></span> Delivered</div>
        <span class="breakdown-count">${summary.delivered||0}</span>
      </div>${bar(summary.delivered||0,'#22c55e')}
    </div>
    <div class="breakdown-item">
      <div class="breakdown-head">
        <div class="breakdown-label"><span class="dot dot-cancelled"></span> Cancelled</div>
        <span class="breakdown-count">${summary.cancelled||0}</span>
      </div>${bar(summary.cancelled||0,'var(--red)')}

/* ─────────────────────────────────────────────────────
   Main load
───────────────────────────────────────────────────── */
async function loadDash() {
  const [summaryRes, ordersRes, pendingRes, meRes] = await Promise.all([
    apiFetch('/orders/summary/me'),
    apiFetch('/orders?limit=8'),
    apiFetch('/reviews/pending'),
    apiFetch('/auth/me'),
  ]);

  const summary = summaryRes.ok ? summaryRes.data.data                    : {};
  const orders  = ordersRes.ok  ? ordersRes.data.data.orders              : [];
  const pending = pendingRes.ok ? pendingRes.data.data.pending_reviews    : [];
  const me      = meRes.ok      ? meRes.data.data.user                    : user;

  buildTopbar(me);
  buildSidebar(me, summary);

  const hasSub      = me.subscription_active || me.has_subscription || false;
  const firstName   = me.name.split(' ')[0];
  const dashIcon    = isFarmer ? '🌾' : '🛒';
  const dashLabel   = isFarmer ? 'Farmer Dashboard' : 'Buyer Dashboard';

  const ordersHTML = orders.length === 0
    ? `<div class="empty-state">
         <div class="icon">${isFarmer?'🌾':'🛒'}</div>
         <h3>No orders yet</h3>
         <p>${isFarmer?"When buyers place orders, they'll appear here.":'Browse listings and place your first order.'}</p>
         <a href="${isFarmer?'/pages/my-listings.html':'/pages/browse.html'}" class="btn-primary-sm">
           ${isFarmer?'Post a Listing':'Browse Produce'}
         </a>
       </div>`
    : orders.map(buildOrderCard).join('');

  const reviewsHTML = pending.length > 0 ? `
  <div style="margin-bottom:1.75rem">
    <div class="sec-head"><div class="sec-title">⭐ Reviews to Write</div></div>
    ${pending.map(p=>`
    <div class="review-card">
      <div class="rc-icon">👤</div>
      <div style="flex:1;min-width:0">
        <div class="rc-name">${p.reviewee_name}</div>
        <div class="rc-sub">${p.items_summary||'Order #'+p.order_id.slice(0,8).toUpperCase()}</div>
      </div>
      <button class="qbtn qbtn-soft" style="padding:0.4rem 0.9rem;font-size:0.76rem;border-radius:8px"
        onclick="openReview('${p.order_id}','${p.reviewee_id}','${p.reviewee_name}')">
        Write Review →
      </button>
    </div>`).join('')}
  </div>` : '';

  document.getElementById('dashContent').innerHTML = `
    ${!hasSub ? `
    <div class="alert-banner" id="alertBanner">
      <div class="alert-icon">ℹ</div>
      <div>You don't have an active subscription. You can only list basic produce and will be charged 15.0% on completed orders.

      </div>
      <button class="alert-close" onclick="this.closest('.alert-banner').remove()">✕</button>
    </div>` : ''}

      <div class="page-title-wrap">
        <span class="page-title-icon">${dashIcon}</span>
        <div>
          <div class="page-title">${dashLabel}</div>
          <div class="page-subtitle">Welcome back, ${firstName}. Here's your overview.</div>
        </div>
      </div>
    </div>

    ${buildStats(summary)}

    <div class="content-wrap">
      <div>
        <div class="quick-actions">
          ${isFarmer
            ? `<a href="/pages/my-listings.html" class="qbtn qbtn-primary">＋ Post Listing</a>
               <a href="/pages/orders.html"      class="qbtn qbtn-soft">📦 All Orders</a>
               <a href="/pages/prices.html"      class="qbtn qbtn-soft">📊 Prices</a>
               <a href="/pages/my-listings.html" class="qbtn qbtn-soft">🌿 My Listings</a>`
            : `<a href="/pages/browse.html"      class="qbtn qbtn-primary">🛒 Browse Produce</a>
               <a href="/pages/orders.html"      class="qbtn qbtn-soft">📦 My Orders</a>
               <a href="/pages/prices.html"      class="qbtn qbtn-soft">📊 Prices</a>`}

        <div class="sec-head">

          <a href="/pages/orders.html" class="sec-link">View all →</a>
        </div>

      <aside class="sidebar-panel">
        ${buildPanel(me, summary)}

    </div>
  `;

  document.getElementById('loadingSkeleton').style.display = 'none';
  document.getElementById('dashContent').style.display     = 'block';
}

/* ─────────────────────────────────────────────────────
   Review modal
───────────────────────────────────────────────────── */
let pendingReviewOrder = null;

function pickStar(n) {
  document.getElementById('reviewRating').value = n;
  document.querySelectorAll('.star-opt').forEach((s,i) => {
    s.textContent     = i < n ? '★' : '☆';
    s.style.color     = i < n ? 'var(--gold)' : 'var(--subtext)';
    s.style.transform = i < n ? 'scale(1.1)' : 'scale(1)';
  });
}
pickStar(5);

function openReview(orderId, revieweeId, name) {
  pendingReviewOrder = { orderId, revieweeId };
  document.getElementById('reviewFor').textContent     = `Reviewing your experience with ${name}`;
  document.getElementById('reviewError').style.display = 'none';
  document.getElementById('reviewComment').value       = '';
  pickStar(5);
  document.getElementById('reviewModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeReviewModal() {
  document.getElementById('reviewModal').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('reviewModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeReviewModal();
});

async function submitReview() {
  if (!pendingReviewOrder) return;
  const btn = document.getElementById('reviewSubmitBtn');
  btn.disabled = true; btn.textContent = 'Submitting…';
  const { ok, data } = await apiFetch('/reviews', {
    method: 'POST',
    body: JSON.stringify({
      order_id: pendingReviewOrder.orderId,
      rating:   parseInt(document.getElementById('reviewRating').value),
      comment:  document.getElementById('reviewComment').value.trim(),
    })
  });
  if (ok) {
    closeReviewModal();
    showToast('Review submitted! ⭐','success');
    loadDash();
  } else {
    const errEl = document.getElementById('reviewError');
    errEl.textContent    = (data&&data.message)||'Could not submit review.';
    errEl.style.display  = 'block';
    btn.disabled         = false;
    btn.textContent      = 'Submit Review';
  }
}

/* ─────────────────────────────────────────────────────
   Mobile sidebar toggle
───────────────────────────────────────────────────── */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

/* ─────────────────────────────────────────────────────
   Boot
───────────────────────────────────────────────────── */
loadDash();
</script>
</body>
